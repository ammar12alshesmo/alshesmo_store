    <title>تأكيد الطلب - الشسمو للورد</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            font-family: 'Cairo', sans-serif; margin: 0; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
            background: linear-gradient(-45deg, #f8f9ff, #e0c3fc, #8ec5fc, #fbc2eb);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .mobile-container { width: 100%; max-width: 420px; text-align: center; }
        .glass-box {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(25px);
            border-radius: 40px; padding: 40px 25px; border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 50px rgba(109, 89, 122, 0.1);
        }
        .flower-icon { font-size: 70px; margin-bottom: 15px; display: inline-block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        h2 { color: #4a4e69; font-weight: 900; margin-bottom: 10px; font-size: 26px; }
        p { color: #6d597a; font-weight: 700; margin-bottom: 30px; line-height: 1.5; font-size: 15px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            width: 100%; height: 70px; border-radius: 25px; font-family: 'Cairo';
            font-weight: 900; font-size: 18px; cursor: pointer; border: none;
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            gap: 12px; text-decoration: none; color: white;
        }
        .btn-whatsapp { background: #25D366; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }
        .btn-back { background: white; color: #6d597a; border: 2px solid #6d597a; height: 55px; }
        .svg-icon { width: 28px; height: 28px; fill: white; }

<body>

<div class="mobile-container">
    <div class="glass-box">
        <div class="flower-icon">🎁</div>
        <h2 id="pageTitle">جاهز للإرسال؟</h2>
        <p id="pageDesc">بضغطة زر وحدة، رح توصل الفاتورة كاملة عبر الواتساب ✨</p>

        <div class="btn-group">
            <button class="btn btn-whatsapp" onclick="sendWhatsApp()">

                <span>إرسال عبر واتساب</span>
            </button>
            <button class="btn btn-back" onclick="window.location.href='page6.html'">العودة للسلة</button>
        </div>
    </div>
</div>

<script>
    function generateFullOrderMessage() {
        // سحب السلة بالكامل من localStorage
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const isPromoUsed = sessionStorage.getItem('promo_applied') === 'true';

        let message = `🌸 *طلب جديد من متجر الشسمو للورد*\n\n`;
        
        // معلومات الزبون
        message += `👤 *معلومات الزبون:*\n`;
        message += `■ الاسم: ${sessionStorage.getItem('customer_name') || "غير متوفر"}\n`;
        message += `■ الهاتف: ${sessionStorage.getItem('customer_phone') || "غير متوفر"}\n`;
        message += `■ الجامعة: ${sessionStorage.getItem('customer_uni') || "غير متوفر"}\n\n`;
        
        message += `───────────────────\n`;
        message += `📦 *تفاصيل الطلب:*\n\n`;

        let rawTotal = 0;

        if (cart.length === 0) {
            message += `_السلة فارغة_\n`;
        } else {
            cart.forEach((item, index) => {
                message += `${index + 1}. *${item.name}*\n`;
                // عرض تفاصيل الصنف مباشرة كما هي مخزنة
                message += `${item.details}\n`;
                message += `■ السعر: ${parseFloat(item.price).toFixed(2)} د.أ\n`;
                message += `───────────────────\n`;
                rawTotal += parseFloat(item.price);
            });
        }

        // الحساب النهائي
        let finalPrice = isPromoUsed ? rawTotal * 0.9 : rawTotal;
        
        if(isPromoUsed) {
            message += `\n✅ *تم تطبيق خصم 10%*\n`;
            message += `💰 *المجموع قبل الخصم:* ${rawTotal.toFixed(2)} د.أ\n`;
        }
        
        message += `💰 *المجموع النهائي: ${finalPrice.toFixed(2)} دينار أردني*\n\n`;
        message += `📍 تم الطلب عبر الموقع الرسمي | تحياتنا ✨`;
        
        return message;
    }

    function sendWhatsApp() {
        const msgText = generateFullOrderMessage();
        const msgEncoded = encodeURIComponent(msgText);
        window.open(`https://wa.me/962797941177?text=${msgEncoded}`, '_blank');
    }
</script>
