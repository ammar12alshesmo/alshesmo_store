<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تأكيد الطلب - الشسمو للورد</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            font-family: 'Cairo', sans-serif; margin: 0; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
            background: linear-gradient(-45deg, #f8f9ff, #e0c3fc, #8ec5fc, #fbc2eb);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .lang-switch-btn {
            position: fixed; top: 15px; right: 15px; z-index: 10001;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border: 2px solid #fff; padding: 8px 15px; border-radius: 15px;
            font-weight: 900; color: #4a4e69; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            font-size: 14px;
        }

        .mobile-container { width: 100%; max-width: 420px; text-align: center; }
        .glass-box {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(25px);
            border-radius: 40px; padding: 40px 25px; border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 50px rgba(109, 89, 122, 0.1);
        }
        .flower-icon { font-size: 70px; margin-bottom: 15px; display: inline-block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        h2 { color: #4a4e69; font-weight: 900; margin-bottom: 10px; font-size: 26px; }
        p { color: #6d597a; font-weight: 700; margin-bottom: 30px; line-height: 1.5; font-size: 15px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            width: 100%; height: 70px; border-radius: 25px; font-family: 'Cairo';
            font-weight: 900; font-size: 18px; cursor: pointer; border: none;
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            gap: 12px; text-decoration: none; color: white;
        }
        .btn-whatsapp { background: #25D366; }
        .btn-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .btn-back { background: white; color: #6d597a; border: 2px solid #6d597a; height: 55px; }
        .svg-icon { width: 28px; height: 28px; fill: white; }
    </style>
</head>
<body>

<div class="lang-switch-btn" onclick="toggleLanguage()" id="langBtn">EN</div>

<div class="mobile-container">
    <div class="glass-box">
        <div class="flower-icon">🎁</div>
        <h2 id="pageTitle">جاهز للإرسال؟</h2>
        <p id="pageDesc">بضغطة زر وحدة، رح توصل الفاتورة كاملة ✨</p>

        <div class="btn-group">
            <button class="btn btn-whatsapp" onclick="sendWhatsApp()">
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                <span id="btnWaText">إرسال عبر واتساب</span>
            </button>
            <button class="btn btn-insta" onclick="sendInsta()">
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 1.764.308 2.13.674.366.366.612.764.674 2.13.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.308 1.764-.674 2.13-.366.366-.764.612-2.13.674-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-1.764-.308-2.13-.674-.366-.366-.612-.764-.674-2.13C2.175 15.584 2.163 15.204 2.163 12s.012-3.85c.062-1.366.308-1.764.674-2.13.366-.366.764-.612 2.13-.674 1.266-.058 1.646-.07 4.85-.07zm0-2.163C8.741 0 8.332.015 7.052.074c-1.984.092-3.235.408-4.103.746a5.83 5.83 0 00-2.105 1.372 5.83 5.83 0 00-1.372 2.105C.136 5.177.092 6.428.074 8.412.015 9.691 0 10.1 0 13.41s.015 3.719.074 4.998c.092 1.984.408 3.236.746 4.103a5.83 5.83 0 001.372 2.105 5.83 5.83 0 002.105 1.372c.867.338 2.119.654 4.103.746 1.28.059 1.689.074 4.998.074s3.719-.015 4.998-.074c1.984-.092 3.236-.408 4.103-.746a5.83 5.83 0 002.105-1.372 5.83 5.83 0 001.372-2.105c.338-.867.654-2.119.746-4.103.059-1.28.074-1.689.074-4.998s-.015-3.719-.074-4.998c-.092-1.984-.408-3.236-.746-4.103a5.83 5.83 0 00-1.372-2.105 5.83 5.83 0 00-2.105-1.372c-.867-.338-2.119-.654-4.103-.746-1.28-.059-1.689-.074-4.998-.074z"/><path d="M12 6.52a5.48 5.48 0 100 10.96 5.48 5.48 0 000-10.96zm0 9.132a3.65 3.65 0 110-7.302 3.65 3.65 0 010 7.302z"/><circle cx="17.59" cy="6.41" r="1.28"/></svg>
                <span id="btnInstaText">إرسال عبر إنستغرام</span>
            </button>
            <button class="btn btn-back" id="btnBackText" onclick="window.location.href='page6.html'">العودة للسلة</button>
        </div>
    </div>
</div>

<script>
    const translations = {
        ar: {
            lang: "EN", title: "جاهز للإرسال؟", desc: "بضغطة زر وحدة، رح توصل الفاتورة كاملة ✨",
            waBtn: "إرسال عبر واتساب", instaBtn: "إرسال عبر إنستغرام", backBtn: "العودة للسلة",
            msgHeader: "🌸 *طلب جديد من متجر الشسمو*", msgUserInfo: "👤 *معلومات الزبون:*",
            msgName: "الاسم", msgPhone: "الهاتف", msgUni: "الجامعة", msgDetailsHead: "📦 *تفاصيل الطلبات:*",
            msgFlowerSec: "🌹 *قسم الورد :*", msgStickerSec: "✨ *قسم الستيكرات:*",
            msgQty: "الكمية", msgRoses: "وردة", msgStickers: "ستيكر",
            msgPrice: "السعر", msgTotal: "💰 *المجموع النهائي", msgCurrency: "د.أ*",
            msgFooter: "📍 تم الطلب عبر الموقع | تحياتنا ✨"
        },
        en: {
            lang: "AR", title: "Ready to Send?", desc: "One click to send your full invoice ✨",
            waBtn: "Send via WhatsApp", instaBtn: "Send via Instagram", backBtn: "Back to Cart",
            msgHeader: "🌸 *New Order from Al-Shasmo*", msgUserInfo: "👤 *Customer Info:*",
            msgName: "Name", msgPhone: "Phone", msgUni: "University", msgDetailsHead: "📦 *Order Details:*",
            msgFlowerSec: "🌹 *Flowers & Chocolate:*", msgStickerSec: "✨ *Stickers Section:*",
            msgQty: "Quantity", msgRoses: "Roses", msgStickers: "Stickers",
            msgPrice: "Price", msgTotal: "💰 *Final Total", msgCurrency: "JOD*",
            msgFooter: "📍 Website Order | Regards ✨"
        }
    };

    let currentLang = 'ar';

    function toggleLanguage() {
        currentLang = (currentLang === 'ar') ? 'en' : 'ar';
        const t = translations[currentLang];
        document.documentElement.dir = (currentLang === 'ar') ? "rtl" : "ltr";
        document.getElementById('langBtn').innerText = t.lang;
        document.getElementById('pageTitle').innerText = t.title;
        document.getElementById('pageDesc').innerText = t.desc;
        document.getElementById('btnWaText').innerText = t.waBtn;
        document.getElementById('btnInstaText').innerText = t.instaBtn;
        document.getElementById('btnBackText').innerText = t.backBtn;
    }

    function formatDetails(details) {
        if(!details) return "";
        return details.split(/[|/]/).map(part => {
            const trimmed = part.trim();
            if (!trimmed || trimmed.includes("الإجمالي") || trimmed.includes("الكمية")) return "";
            if (trimmed.includes(":")) {
                let [key, val] = trimmed.split(":");
                return `■ ${key.trim()} : ${val.trim()}`;
            }
            return `■ ${trimmed}`;
        }).filter(p => p !== "").join('\n');
    }

    function generateFullOrderMessage() {
        const t = translations[currentLang];
        const flower = JSON.parse(sessionStorage.getItem('flower_order'));
        const stickers = JSON.parse(sessionStorage.getItem('sticker_order'));
        const embroidery = JSON.parse(sessionStorage.getItem('embroidery_order'));
        const isPromoUsed = sessionStorage.getItem('promo_applied') === 'true';

        let message = `${t.msgHeader}\n\n`;
        message += `${t.msgUserInfo}\n`;
        message += `■ ${t.msgName}: ${sessionStorage.getItem('customer_name') || "N/A"}\n`;
        message += `■ ${t.msgPhone}: ${sessionStorage.getItem('customer_phone') || "N/A"}\n`;
        message += `■ ${t.msgUni}: ${sessionStorage.getItem('customer_uni') || "N/A"}\n\n`;
        message += `───────────────────\n\n`;
        message += `${t.msgDetailsHead}\n\n`;

        let rawTotal = 0;

        // قسم الورد
        if(flower) {
            message += `${t.msgFlowerSec}\n`;
            message += formatDetails(flower.details) + `\n`;
            let displayQty = flower.qty || flower.count || 0;
            message += `■ ${t.msgQty}: ${displayQty} ${t.msgRoses}\n`;
            message += `■ ${t.msgPrice}: ${parseFloat(flower.price).toFixed(2)} ${t.msgCurrency.replace('*','')}\n\n`;
            rawTotal += parseFloat(flower.price);
        }

        // قسم التطريز
        if(embroidery) {
            message += `🪡 *قسم التطريز:*\n`;
            message += `■ الشكل : ${embroidery.shape}\n`;
            message += `■ النص : ${embroidery.text || "---"}\n`;
            message += `■ السعر : ${parseFloat(embroidery.price).toFixed(2)} ${t.msgCurrency.replace('*','')}\n\n`;
            rawTotal += parseFloat(embroidery.price);
        }

        // قسم الستيكرات
        if(stickers) {
            message += `${t.msgStickerSec}\n`;
            message += formatDetails(stickers.details) + `\n`;
            let displayQty = stickers.qty || stickers.count || 0;
            message += `■ ${t.msgQty}: ${displayQty} ${t.msgStickers}\n`;
            message += `■ ${t.msgPrice}: ${parseFloat(stickers.price).toFixed(2)} ${t.msgCurrency.replace('*','')}\n\n`;
            rawTotal += parseFloat(stickers.price);
        }

        message += `───────────────────\n\n`;
        let finalPrice = isPromoUsed ? rawTotal * 0.9 : rawTotal;
        message += `${t.msgTotal}: ${finalPrice.toFixed(2)} ${t.msgCurrency}\n\n`;
        message += `───────────────────\n\n`;
        message += `${t.msgFooter}`;
        
        return message;
    }

    function sendWhatsApp() {
        const msg = encodeURIComponent(generateFullOrderMessage());
        window.open(`https://wa.me/962797941177?text=${msg}`, '_blank');
    }

    function sendInsta() {
        const msg = generateFullOrderMessage();
        navigator.clipboard.writeText(msg).then(() => {
            alert(currentLang === 'ar' ? "تم نسخ الطلب! الصقه في محادثة إنستغرام" : "Order copied! Paste in Instagram DM");
            window.open("https://www.instagram.com/alshesmollward?igsh=Z3BlemQ3NmIxMHJq", '_blank');
        });
    }
</script>
</body>
</html>
