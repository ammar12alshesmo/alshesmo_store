<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>الشسمو للورد - تسجيل الدخول</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; }
        
        body {
            font-family: 'Cairo', sans-serif; margin: 0; 
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            background: linear-gradient(-45deg, #f8f9ff, #e0c3fc, #8ec5fc, #fbc2eb);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .mobile-container { width: 100%; max-width: 420px; padding: 20px 25px; display: flex; flex-direction: column; align-items: center; }
        
        .lang-switch-btn {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border: 2px solid #fff; padding: 10px 18px; border-radius: 20px;
            font-weight: 900; color: #4a4e69; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* تعديل الحجم والنزول للأسفل */
        .logo-img { 
            width: 260px; 
            height: 260px; 
            object-fit: contain; 
            filter: drop-shadow(0 15px 25px rgba(142, 197, 252, 0.4)); 
            margin-top: 30px; 
            margin-bottom: 20px; 
        }

        h2 { color: #4a4e69; font-size: 34px; margin: 0; font-weight: 900; text-align: center; }
        p { color: #6d597a; margin: 10px 0 35px 0; font-size: 17px; font-weight: 600; opacity: 0.8; text-align: center; }
        .glass-box { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(25px); border-radius: 45px; padding: 40px 25px; border: 2px solid rgba(255, 255, 255, 0.6); box-shadow: 0 30px 60px -12px rgba(109, 89, 122, 0.15); width: 100%; }
        
        .input-group { margin-bottom: 22px; }
        html[dir="rtl"] .input-group { text-align: right; }
        html[dir="ltr"] .input-group { text-align: left; }

        label { color: #4a4e69; display: block; margin-bottom: 10px; font-size: 14px; font-weight: 800; }
        html[dir="rtl"] label { padding-right: 12px; }
        html[dir="ltr"] label { padding-left: 12px; }

        input, select { width: 100%; height: 65px; border-radius: 22px; border: 2px solid transparent; padding: 0 25px; font-size: 16px; font-family: 'Cairo'; background: rgba(240, 243, 255, 0.8); color: #333; transition: 0.4s; }
        input:focus, select:focus { background: #fff; border-color: #8ec5fc; box-shadow: 0 10px 25px rgba(142, 197, 252, 0.3); }
        .btn-submit { width: 100%; height: 70px; background: linear-gradient(135deg, #6d597a 0%, #4a4e69 100%); color: white; border: none; border-radius: 25px; font-size: 22px; font-weight: 900; cursor: pointer; margin-top: 15px; box-shadow: 0 15px 30px rgba(109, 89, 122, 0.3); }
        .btn-submit:active { transform: scale(0.92); }

        select { 
            appearance: none !important; 
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            background-repeat: no-repeat !important; 
            background-size: 16px !important;
        }

        html[dir="rtl"] select { 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236d597a' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e") !important; 
            background-position: left 20px center !important; 
            padding-left: 45px;
            padding-right: 25px;
        }

        html[dir="ltr"] select { 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236d597a' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e") !important; 
            background-position: right 20px center !important; 
            padding-right: 45px;
            padding-left: 25px;
        }

        select::-ms-expand { display: none; }
    </style>
</head>
<body>

    <div class="lang-switch-btn" onclick="toggleLanguage()" id="langBtn">EN</div>

    <div class="mobile-container">
        <img src="flower.png" alt="اللوجو" class="logo-img">
        <h2 id="titleText">الشسمو للورد</h2>
        <p id="subtitleText">خدمة سريعة وجودة عالية</p>

        <div class="glass-box">
            <form id="mainForm">
                <div class="input-group">
                    <label id="labelName">الاسم الثلاثي</label>
                    <input type="text" id="name" placeholder="أدخل اسمك الثلاثي..." required autocomplete="name">
                </div>

                <div class="input-group">
                    <label id="labelUni">الجامعة</label>
                    <select id="uni" required>
                        <option value="" disabled selected id="optDefault">اختر جامعتك</option>
                        <option value="التكنو" id="opt1">جامعة  التكنو</option>
                        <option value="الشرق الأوسط" id="opt2">جامعة الشرق الأوسط</option>
                    </select>
                </div>

                <div class="input-group">
                    <label id="labelPhone">رقم التواصل</label>
                    <input type="tel" id="phone" placeholder="07XXXXXXXX" pattern="07[789][0-9]{7}" inputmode="tel" required autocomplete="tel">
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">دخول</button>
            </form>
        </div>
    </div>

    <script>
        const translations = {
            ar: {
                lang: "EN", title: "الشسمو للورد", subtitle: "خدمة سريعة وجودة عالية",
                name: "الاسم الثلاثي", namePl: "أدخل اسمك الثلاثي...",
                uni: "الجامعة", uniPl: "اختر جامعتك",
                u1: "جامعة  التكنو", u2: "جامعة الشرق الأوسط",
                phone: "رقم التواصل", btn: "دخول",
                alert: "يا هلا فيك! ياريت تكتب اسمك الثلاثي لضمان دقة التوصيل 🌸"
            },
            en: {
                lang: "AR", title: "Al-Shasmo llward", subtitle: "Fast service and high quality",
                name: "Full Triple Name", namePl: "Enter your full name...",
                uni: "University", uniPl: "Select your university",
                u1: "JUST University", u2: "Middle East University",
                phone: "Contact Number", btn: "Login",
                alert: "Welcome! Please enter your triple name for delivery accuracy 🌸"
            }
        };

        function toggleLanguage() {
            const html = document.documentElement;
            const isAr = html.getAttribute('dir') === 'rtl';
            const newLang = isAr ? 'en' : 'ar';
            const t = translations[newLang];

            html.setAttribute('dir', isAr ? 'ltr' : 'rtl');
            html.setAttribute('lang', newLang);

            document.getElementById('langBtn').innerText = t.lang;
            document.getElementById('titleText').innerText = t.title;
            document.getElementById('subtitleText').innerText = t.subtitle;
            document.getElementById('labelName').innerText = t.name;
            document.getElementById('name').placeholder = t.namePl;
            document.getElementById('labelUni').innerText = t.uni;
            document.getElementById('optDefault').innerText = t.uniPl;
            document.getElementById('opt1').innerText = t.u1;
            document.getElementById('opt2').innerText = t.u2;
            document.getElementById('labelPhone').innerText = t.phone;
            document.getElementById('submitBtn').innerText = t.btn;
        }

        window.onload = function() {
            const savedName = sessionStorage.getItem('customer_name');
            const savedUni = sessionStorage.getItem('customer_uni');
            const savedPhone = sessionStorage.getItem('customer_phone');

            if (savedName) document.getElementById('name').value = savedName;
            if (savedUni) document.getElementById('uni').value = savedUni;
            if (savedPhone) document.getElementById('phone').value = savedPhone;
        };

        document.getElementById('mainForm').onsubmit = function(e) {
            e.preventDefault();
            const isEn = document.documentElement.lang === 'en';
            const nameInput = document.getElementById('name').value.trim();
            const uniInput = document.getElementById('uni').value;
            const phoneInput = document.getElementById('phone').value.trim();
            
            const nameParts = nameInput.split(/\s+/).filter(part => part.length > 0);
            if (nameParts.length < 3) {
                alert(isEn ? translations.en.alert : translations.ar.alert);
                return;
            }

            sessionStorage.setItem('customer_name', nameInput);
            sessionStorage.setItem('customer_uni', uniInput);
            sessionStorage.setItem('customer_phone', phoneInput);
            
            document.body.style.opacity = '0';
            document.body.style.transition = '0.5s';
            
            setTimeout(() => {
                window.location.href = 'page2.html';
            }, 500);
        };
    </script>
</body>
</html>
