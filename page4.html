<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <title>قسم التطريز - الشسمو</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap');

        /* إعدادات عامة */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none !important; 
            user-select: none; 
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0; 
            /* دعم المناطق الآمنة في الهواتف الحديثة */
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            background: linear-gradient(-45deg, #fff1eb, #ace0f9, #ebd3e8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            transition: opacity 0.5s;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .mobile-container { width: 100%; max-width: 420px; padding: 20px; text-align: center; }

        /* زر اللغة الثابت */
        .lang-switch-btn {
            position: fixed; top: 15px; right: 15px; z-index: 10001;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border: 2px solid #fff; padding: 8px 15px; border-radius: 15px;
            font-weight: 900; color: #4a4e69; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            font-size: 14px;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 30px 20px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            margin-top: 40px;
        }

        h2 { color: #4a4e69; font-size: 22px; margin-bottom: 25px; font-weight: 900; }

        .step-content { display: none; animation: fadeIn 0.4s ease-out; }
        .step-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .item-card {
            background: white; border-radius: 25px; padding: 12px;
            border: 3px solid transparent; transition: 0.3s; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .item-card img { width: 100%; border-radius: 18px; margin-bottom: 8px; }
        .item-card.selected { border-color: #6d597a; background: #fdfaff; transform: scale(1.03); }
        .item-card span { font-weight: 800; color: #4a4e69; font-size: 14px; }

        .input-group { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        html[dir="rtl"] .input-group { text-align: right; }
        html[dir="ltr"] .input-group { text-align: left; }
        
        .input-group label { display: block; font-weight: 800; margin-bottom: 12px; color: #4a4e69; font-size: 15px; }
        
        textarea {
            width: 100%; height: 80px; border-radius: 18px; border: 2px solid #f0f0f0;
            padding: 15px; font-family: 'Cairo'; font-size: 15px; resize: none; background: #fafafa; margin-bottom: 10px;
        }

        .canvas-area {
            background: #fff; border: 2px dashed #6d597a; border-radius: 20px;
            margin-bottom: 10px; position: relative; touch-action: none; overflow: hidden;
        }
        #drawCanvas { width: 100%; height: 200px; cursor: crosshair; display: block; border-radius: 20px; }
        
        .canvas-controls { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .colors { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s; }
        .color-dot.active { border-color: #6d597a; transform: scale(1.2); }
        
        .tool-bar { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .tool-btn {
            background: #f0f0f0; border: none; padding: 6px 15px; border-radius: 12px;
            font-family: 'Cairo'; font-weight: 800; font-size: 12px; cursor: pointer; transition: 0.2s;
        }
        .tool-btn.active { background: #6d597a; color: white; }
        .clear-btn { background: #ffeded; color: #ff4d4d; border: none; padding: 6px 15px; border-radius: 12px; font-family: 'Cairo'; font-weight: 800; font-size: 12px; cursor: pointer; }
        .download-btn { background: #e3f2fd; color: #1976d2; border: none; padding: 6px 15px; border-radius: 12px; font-family: 'Cairo'; font-weight: 800; font-size: 12px; cursor: pointer; }

        .upload-box {
            border: 2px dashed #cbd5e0; border-radius: 20px; padding: 15px;
            cursor: pointer; transition: 0.3s; background: #fafafa; margin-top: 10px;
        }
        
        .preview-wrapper { position: relative; margin-top: 10px; display: none; animation: fadeIn 0.3s; }
        .remove-btn {
            position: absolute; top: 10px; right: 10px; background: #ff4d4d; color: white; border: none;
            border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-weight: 900; font-size: 16px;
            box-shadow: 0 4px 10px rgba(255,77,77,0.3); display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        #preview-img { width: 100%; border-radius: 20px; border: 3px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .btn-group { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 30px; }
        .btn {
            flex: 1; height: 65px; border-radius: 22px; font-family: 'Cairo';
            font-weight: 900; font-size: 18px; cursor: pointer; border: none; transition: 0.2s;
            min-width: 120px;
        }
        .btn-next { background: linear-gradient(135deg, #6d597a, #4a4e69); color: white; }
        .btn-back { background: white; color: #6d597a; border: 2px solid #6d597a; }

        .receipt-container { background: white; padding: 20px; border-radius: 25px; }
        html[dir="rtl"] .receipt-container { text-align: right; }
        html[dir="ltr"] .receipt-container { text-align: left; }
        .receipt-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 700; color: #4a4e69; }
        #summaryDrawing { width: 100%; border-radius: 15px; border: 1px solid #ddd; margin-top: 10px; display: none; }
        .download-summary-btn { 
            background: #6d597a; color: white; border: none; padding: 10px 20px; 
            border-radius: 15px; font-family: 'Cairo'; font-weight: 800; margin-top: 10px; cursor: pointer; width: 100%;
        }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 10000;
            flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box {
            background: white; padding: 20px; border-radius: 30px; width: 100%; max-width: 350px; text-align: center;
        }
        .modal-box img { width: 100%; border-radius: 20px; border: 2px solid #eee; margin: 15px 0; }
        .modal-box p { color: #4a4e69; font-weight: 800; font-size: 14px; margin: 0; }
        .close-modal-btn { 
            background: #6d597a; color: white; border: none; padding: 12px 0; width: 100%;
            border-radius: 15px; font-family: 'Cairo'; font-weight: 900; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="saveModal" class="modal-overlay">
    <div class="modal-box">
        <p id="modalHint">اضغط مطولاً على الرسمة لحفظها 💾</p>
        <img id="modalImg" src="">
        <button class="close-modal-btn" id="modalCloseBtn" onclick="closeSaveModal()">إغلاق</button>
    </div>
</div>

<div class="lang-switch-btn" onclick="toggleLanguage()" id="langBtn">EN</div>

<div class="mobile-container">
    <div class="glass-box">
        
        <div id="step1" class="step-content active">
            <h2 id="h2-step1">اختر شكل اللوحة 🪡</h2>
            <div class="grid-options">
                <div class="item-card" onclick="selectShape('round', '5 JOD', this)">
                    <img src="emb1.png"><span class="shape-name">دائرية خشبية</span>
                </div>
                <div class="item-card" onclick="selectShape('square', '5 JOD', this)">
                    <img src="emb2.png"><span class="shape-name">مربعة كلاسيك</span>
                </div>
                <div class="item-card" onclick="selectShape('oval', '5 JOD', this)">
                    <img src="emb3.png"><span class="shape-name">بيضوية مودرن</span>
                </div>
                <div class="item-card" onclick="selectShape('heart', '5 JOD', this)">
                    <img src="emb4.png"><span class="shape-name">شكل قلب</span>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-back btn-back-text" onclick="window.location.href='page2.html'">عودة</button>
                <button class="btn btn-next btn-next-text" onclick="validateStep(1, 2)">التالي</button>
            </div>
        </div>

        <div id="step2" class="step-content">
            <h2 id="h2-step2">شو حابب نطرّزلك؟ ✨</h2>
            <div class="input-group">
                <label id="lbl-embText">اكتب النص أو ارسم فكرتك:</label>
                <textarea id="embText" placeholder="اكتب عبارة أو ملاحظات هنا..."></textarea>
                
                <div class="canvas-area">
                    <canvas id="drawCanvas"></canvas>
                </div>
                <div class="canvas-controls">
                    <div class="colors">
                        <div class="color-dot active" style="background: #000;" onclick="changeColor('#000', this)"></div>
                        <div class="color-dot" style="background: #ff4d4d;" onclick="changeColor('#ff4d4d', this)"></div>
                        <div class="color-dot" style="background: #3498db;" onclick="changeColor('#3498db', this)"></div>
                        <div class="color-dot" style="background: #2ecc71;" onclick="changeColor('#2ecc71', this)"></div>
                        <div class="color-dot" style="background: #f1c40f;" onclick="changeColor('#f1c40f', this)"></div>
                        <div class="color-dot" style="background: #9b59b6;" onclick="changeColor('#9b59b6', this)"></div>
                    </div>
                    <div class="tool-bar">
                        <button id="eraserBtn" class="tool-btn" onclick="useEraser(this)">🧽 محاية</button>
                        <button class="download-btn" id="btn-download" onclick="showSaveModal()">تنزيل الصورة 📥</button>
                        <button class="clear-btn" id="btn-clear" onclick="clearCanvas()">مسح الكل 🗑️</button>
                    </div>
                </div>

                <div class="upload-box" id="dropzone" onclick="document.getElementById('fileInput').click()">
                    <span id="lbl-upload">📁 أو ارفع صورة جاهزة</span>
                    <input type="file" id="fileInput" accept="image/*" hidden onchange="handleImage(this)">
                </div>
                
                <div class="preview-wrapper" id="previewWrapper">
                    <button class="remove-btn" onclick="removeImage(event)">✕</button>
                    <img id="preview-img">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-back btn-back-text" onclick="goToStep(1)">عودة</button>
                <button class="btn btn-next btn-next-text" onclick="validateStep(2, 3)">التالي</button>
            </div>
        </div>

        <div id="step3" class="step-content">
            <h2 id="h2-step3">ملخص طلب التطريز 🧾</h2>
            <div id="invoiceContent"></div>
            <img id="summaryDrawing">
            <button id="summaryDownloadBtn" class="download-summary-btn" style="display:none;" onclick="showSaveModal()">حفظ الرسمة 💾</button>
            <div class="btn-group">
                <button class="btn btn-back btn-back-text" onclick="goToStep(2)">تعديل</button>
                <button class="btn btn-next btn-confirm-text" onclick="confirmAndStore()">تأكيد</button>
            </div>
        </div>

    </div>
</div>

<script>
    const translations = {
        ar: {
            lang: "EN",
            step1: "اختر شكل اللوحة 🪡",
            step2: "شو حابب نطرّزلك؟ ✨",
            step3: "ملخص طلب التطريز 🧾",
            shapes: ["دائرية خشبية", "مربعة كلاسيك", "بيضوية مودرن", "شكل قلب"],
            back: "عودة",
            next: "التالي",
            confirm: "تأكيد",
            lblText: "اكتب النص أو ارسم فكرتك:",
            placeholder: "اكتب عبارة أو ملاحظات هنا...",
            eraser: "🧽 محاية",
            download: "تنزيل الصورة 📥",
            clear: "مسح الكل 🗑️",
            upload: "📁 أو ارفع صورة جاهزة",
            modalHint: "اضغط مطولاً على الرسمة لحفظها 💾",
            close: "إغلاق",
            alert1: "يرجى اختيار شكل اللوحة أولاً 🪡",
            alert2: "يرجى كتابة نص أو الرسم أو إرفاق صورة ✏️",
            success: "تم وضع الأغراض بالسلة بنجاح! 🛒",
            recLabels: {
                shape: "شكل اللوحة:",
                price: "السعر الأساسي:",
                details: "التفاصيل:",
                noText: "لا يوجد نص",
                drawing: "الرسم اليدوي:",
                exists: "✅ موجود",
                notExists: "❌ لا يوجد",
                save: "حفظ الرسمة 💾"
            }
        },
        en: {
            lang: "AR",
            step1: "Select Hoop Shape 🪡",
            step2: "What to Embroider? ✨",
            step3: "Embroidery Summary 🧾",
            shapes: ["Wooden Round", "Classic Square", "Modern Oval", "Heart Shape"],
            back: "Back",
            next: "Next",
            confirm: "Confirm",
            lblText: "Write text or draw your idea:",
            placeholder: "Write a phrase or notes here...",
            eraser: "🧽 Eraser",
            download: "Download Image 📥",
            clear: "Clear All 🗑️",
            upload: "📁 Or upload an image",
            modalHint: "Long press the image to save it 💾",
            close: "Close",
            alert1: "Please select a hoop shape first 🪡",
            alert2: "Please write text, draw, or attach an image ✏️",
            success: "Items added to cart successfully! 🛒",
            recLabels: {
                shape: "Hoop Shape:",
                price: "Base Price:",
                details: "Details:",
                noText: "No text provided",
                drawing: "Hand Drawing:",
                exists: "✅ Exists",
                notExists: "❌ None",
                save: "Save Drawing 💾"
            }
        }
    };

    let embroideryData = { shape: '', price: '', text: '', imageName: '', drawing: '' };
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let currentColor = '#000';
    let isEraser = false;

    function toggleLanguage() {
        const html = document.documentElement;
        const isAr = html.getAttribute('dir') === 'rtl';
        const newLang = isAr ? 'en' : 'ar';
        const t = translations[newLang];

        html.setAttribute('dir', isAr ? 'ltr' : 'rtl');
        html.setAttribute('lang', newLang);

        document.getElementById('langBtn').innerText = t.lang;
        document.getElementById('h2-step1').innerText = t.step1;
        document.getElementById('h2-step2').innerText = t.step2;
        document.getElementById('h2-step3').innerText = t.step3;
        
        document.querySelectorAll('.shape-name').forEach((el, i) => el.innerText = t.shapes[i]);
        document.querySelectorAll('.btn-back-text').forEach(el => el.innerText = t.back);
        document.querySelectorAll('.btn-next-text').forEach(el => el.innerText = t.next);
        document.querySelector('.btn-confirm-text').innerText = t.confirm;

        document.getElementById('lbl-embText').innerText = t.lblText;
        document.getElementById('embText').placeholder = t.placeholder;
        document.getElementById('eraserBtn').innerText = t.eraser;
        document.getElementById('btn-download').innerText = t.download;
        document.getElementById('btn-clear').innerText = t.clear;
        document.getElementById('lbl-upload').innerText = t.upload;
        document.getElementById('modalHint').innerText = t.modalHint;
        document.getElementById('modalCloseBtn').innerText = t.close;
        document.getElementById('summaryDownloadBtn').innerText = t.recLabels.save;

        if(document.getElementById('step3').classList.contains('active')) showSummary();
    }

    function setupCanvas() {
        if (canvas.width !== canvas.offsetWidth) {
            canvas.width = canvas.offsetWidth;
            canvas.height = 200;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 3;
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }

    function startDrawing(e) { drawing = true; draw(e); }
    function stopDrawing() { drawing = false; ctx.beginPath(); }
    function draw(e) {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
        ctx.strokeStyle = isEraser ? '#ffffff' : currentColor;
        ctx.lineWidth = isEraser ? 20 : 3;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', stopDrawing);

    function changeColor(color, el) {
        isEraser = false; currentColor = color;
        document.querySelectorAll('.color-dot, .tool-btn').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    }

    function useEraser(el) {
        isEraser = true;
        document.querySelectorAll('.color-dot, .tool-btn').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    }

    function clearCanvas() { 
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function showSaveModal() {
        const dataUrl = canvas.toDataURL('image/png');
        document.getElementById('modalImg').src = dataUrl;
        document.getElementById('saveModal').style.display = 'flex';
    }

    function closeSaveModal() {
        document.getElementById('saveModal').style.display = 'none';
    }

    function goToStep(s) {
        document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
        if(s === 2) setTimeout(setupCanvas, 100);
        window.scrollTo(0,0);
    }

    function selectShape(id, price, el) {
        embroideryData.shapeID = id;
        embroideryData.price = price;
        document.querySelectorAll('.item-card').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
    }

    function handleImage(input) {
        const file = input.files[0];
        if (file) {
            embroideryData.imageName = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview-img').src = e.target.result;
                document.getElementById('previewWrapper').style.display = 'block';
                document.getElementById('dropzone').style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    }

    function removeImage(event) {
        event.stopPropagation();
        embroideryData.imageName = '';
        document.getElementById('fileInput').value = '';
        document.getElementById('previewWrapper').style.display = 'none';
        document.getElementById('dropzone').style.display = 'block';
    }

    function validateStep(curr, next) {
        const lang = document.documentElement.lang || 'ar';
        const t = translations[lang];
        
        if(curr == 1 && !embroideryData.shapeID) { alert(t.alert1); return; }
        if(curr == 2) {
            embroideryData.text = document.getElementById('embText').value;
            const pixelData = ctx.getImageData(0,0,canvas.width,canvas.height).data;
            let isCanvasEmpty = true;
            for (let i = 0; i < pixelData.length; i += 4) {
                if (pixelData[i] !== 255 || pixelData[i+1] !== 255 || pixelData[i+2] !== 255) {
                    isCanvasEmpty = false; break;
                }
            }
            embroideryData.drawing = isCanvasEmpty ? '' : canvas.toDataURL();
            if(!embroideryData.text && !embroideryData.imageName && isCanvasEmpty) {
                alert(t.alert2); return;
            }
            showSummary();
        }
        goToStep(next);
    }

    function showSummary() {
        const lang = document.documentElement.lang || 'ar';
        const t = translations[lang];
        
        const shapeMap = { round: t.shapes[0], square: t.shapes[1], oval: t.shapes[2], heart: t.shapes[3] };
        const translatedShape = shapeMap[embroideryData.shapeID];

        let html = `
            <div class="receipt-container">
                <div class="receipt-line"><span>${t.recLabels.shape}</span> <span>${translatedShape}</span></div>
                <div class="receipt-line"><span>${t.recLabels.price}</span> <span>${embroideryData.price}</span></div>
                <hr style="border: 0.5px solid #eee;">
                <div class="receipt-line"><span>${t.recLabels.details}</span></div>
                <p style="text-align:inherit; font-size:14px; background:#f9f9f9; padding:10px; border-radius:10px;">${embroideryData.text || t.recLabels.noText}</p>
                <div class="receipt-line"><span>${t.recLabels.drawing}</span> <span>${embroideryData.drawing ? t.recLabels.exists : t.recLabels.notExists}</span></div>
            </div>
        `;
        document.getElementById('invoiceContent').innerHTML = html;
        const sumImg = document.getElementById('summaryDrawing');
        const sumDownBtn = document.getElementById('summaryDownloadBtn');
        if(embroideryData.drawing) {
            sumImg.src = embroideryData.drawing;
            sumImg.style.display = 'block';
            sumDownBtn.style.display = 'block';
        } else {
            sumImg.style.display = 'none';
            sumDownBtn.style.display = 'none';
        }

        const storageData = {...embroideryData, shape: translatedShape};
        sessionStorage.setItem('embroidery_order', JSON.stringify(storageData));
    }

    function confirmAndStore() {
        const lang = document.documentElement.lang || 'ar';
        alert(translations[lang].success);
        window.location.href = 'page2.html';
    }
</script>
</body>
</html>
