<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-VB8CHYBNCN"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>قسم التطريز - متجر الشسمو</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none !important; user-select: none; }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            background: linear-gradient(-45deg, #fff1eb, #ace0f9, #ebd3e8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .mobile-container { width: 100%; max-width: 420px; padding: 20px; text-align: center; }

        .glass-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 30px 20px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            margin-top: 20px;
        }

        h2 { color: #4a4e69; font-size: 20px; margin-bottom: 20px; font-weight: 900; }

        .step-content { display: none; animation: fadeIn 0.4s ease-out; }
        .step-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .item-card {
            background: white; border-radius: 25px; padding: 12px;
            border: 3px solid transparent; transition: 0.3s; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .item-card img { width: 100%; border-radius: 18px; margin-bottom: 8px; }
        .item-card.selected { border-color: #6d597a; background: #fdfaff; transform: scale(1.05); }
        .item-card span { font-weight: 800; color: #4a4e69; font-size: 14px; display: block; }

        .drawing-zone, .text-zone { background: white; border-radius: 25px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        
        canvas { background: #fff; border: 2px dashed #6d597a; border-radius: 20px; width: 100%; height: 250px; touch-action: none; cursor: crosshair; }
        
        .color-palette { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 10px 0; }
        .color-btn { width: 25px; height: 25px; border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .color-btn.active { transform: scale(1.2); border-color: #6d597a; }

        textarea, input[type="text"] {
            width: 100%; border-radius: 15px; border: 2px solid #f0f0f0; padding: 12px;
            font-family: 'Cairo'; font-size: 14px; margin-bottom: 10px;
        }

        .upload-wrapper {
            position: relative;
            background: #f8f9fa;
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-top: 10px;
            transition: 0.3s;
        }
        .upload-wrapper:active { border-color: #6d597a; background: #f4efff; }
        .upload-wrapper input[type="file"] {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            opacity: 0; cursor: pointer;
        }
        .upload-text { font-size: 13px; font-weight: 800; color: #6d597a; }

        .frame-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0; }
        .frame-card { 
            background: #f8f9fa; border: 2px solid transparent; padding: 5px; 
            border-radius: 15px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
        }
        .frame-card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; margin-bottom: 4px; object-fit: cover; }
        .frame-card span { font-size: 10px; font-weight: 700; color: #4a4e69; }
        .frame-card.selected { border-color: #6d597a; background: #f4efff; }

        .extra-box { 
            display: flex; align-items: center; justify-content: space-between; 
            background: #fdfaff; padding: 12px; border-radius: 15px; 
            margin-top: 10px; border: 1px solid #eee; transition: 0.3s;
        }
        .extra-box.active { background: #6d597a; border-color: #6d597a; color: white; }
        .extra-box.active span { color: white !important; }
        .checkbox-custom { width: 22px; height: 22px; cursor: pointer; accent-color: #6d597a; }

        /* تعديل لإخفاء صندوق الملاحظات في البداية */
        #extraDrawingNotes { display: none; margin-top: 10px; animation: fadeIn 0.3s; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; height: 55px; border-radius: 18px; font-family: 'Cairo'; font-weight: 900; cursor: pointer; border: none; }
        .btn-next { background: #6d597a; color: white; }
        .btn-back { background: white; color: #6d597a; border: 2px solid #6d597a; }

        #proModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10001; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: white; padding: 25px; border-radius: 30px; text-align: center; width: 85%; max-width: 320px; animation: pop 0.3s; }
        @keyframes pop { from { transform: scale(0.8); } to { transform: scale(1); } }
        .modal-btn { background: #6d597a; color: white; border: none; width: 100%; padding: 12px; border-radius: 15px; font-family: 'Cairo'; font-weight: 900; margin-top: 15px; }

        .invoice-card { background: #fdfaff; padding: 15px; border-radius: 20px; border: 1px solid #eee; text-align: right; }
        .inv-line { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; font-weight: 700; color: #4a4e69; }
        .inv-total { border-top: 2px dashed #6d597a; margin-top: 10px; padding-top: 10px; font-size: 18px; color: #6d597a; text-align: center; font-weight: 900; }

        .falling-item { position: fixed; top: -50px; z-index: 9999; pointer-events: none; animation: fall linear forwards; font-size: 24px; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="glass-box">
        
        <div id="step1" class="step-content active">
            <h2>اختر نوع اللوحة 🪡</h2>
            <div class="grid-options">
                <div class="item-card" onclick="selectType('طارة', 'tara.png', this)">
                    <img src="tara.png">
                    <span>طارة خشبية</span>
                </div>
                <div class="item-card" onclick="selectType('لوحة مبروزة', 'laoha.png', this)">
                    <img src="laoha.png">
                    <span>لوحة مبروزة</span>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-back" onclick="window.location.href='page2.html'">عودة</button>
                <button class="btn btn-next" onclick="nextToStep2()">التالي</button>
            </div>
        </div>

        <div id="step2" class="step-content">
            <h2>ماذا تريد أن نطرّز؟ ✨</h2>
            <div class="grid-options">
                <div class="item-card" onclick="selectDesign('رسمة', 15, 'draw.png', this)">
                    <img src="draw.png">
                    <span>رسمة مخصصة (15 JD)</span>
                </div>
                <div class="item-card" onclick="selectDesign('عبارة', 10, 'txt.png', this)">
                    <img src="txt.png">
                    <span>عبارة / أحرفㅤ (10 JD)</span>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-back" onclick="goToStep(1)">عودة</button>
                <button class="btn btn-next" onclick="nextToStep3()">التالي</button>
            </div>
        </div>

        <div id="step3" class="step-content">
            <div id="designContainer"></div>
            <div class="btn-group">
                <button class="btn btn-back" onclick="goToStep(2)">عودة</button>
                <button class="btn btn-next" onclick="prepareInvoice()">الفاتورة</button>
            </div>
        </div>

        <div id="step4" class="step-content">
            <h2>ملخص الطلب 🧾</h2>
            <div id="invoiceContent" class="invoice-card"></div>
            <p style="font-size: 11px; color: #888; margin-top: 10px;">* يرجى إرسال الصورة المختارة عبر الواتساب بعد التأكيد</p>
            <div class="btn-group">
                <button class="btn btn-back" onclick="goToStep(3)">تعديل</button>
                <button class="btn btn-next" onclick="confirmOrder()">تأكيد الطلب 🛒</button>
            </div>
        </div>

    </div>
</div>

<div id="proModal">
    <div class="modal-box">
        <h2 id="modalTitle" style="margin:0; color:#6d597a">تنبيه</h2>
        <p id="modalMsg" style="margin-top:10px; font-weight:700; color:#4a4e69"></p>
        <button class="modal-btn" onclick="closeModal()">حسناً</button>
    </div>
</div>

<script>
    let order = {
        baseType: '',
        designType: '',
        price: 0,
        notes: '',
        textValue: '',
        textColor: '#000000',
        textColorName: 'أسود',
        innerFrame: 'عشوائي',
        extraDrawing: false
    };

    const colors = [
        { hex: "#000000", name: "أسود" },
        { hex: "#FF0000", name: "أحمر" },
        { hex: "#0000FF", name: "أزرق" },
        { hex: "#008000", name: "أخضر" },
        { hex: "#FFFF00", name: "أصفر" },
        { hex: "#800080", name: "بنفسجي" },
        { hex: "#FFA500", name: "برتقالي" },
        { hex: "#FFC0CB", name: "زهري" },
        { hex: "#A52A2A", name: "بني" },
        { hex: "#808080", name: "رمادي" },
        { hex: "#00FFFF", name: "سماوي" },
        { hex: "#FFD700", name: "ذهبي" }
    ];

    function selectType(val, img, el) {
        order.baseType = val;
        document.querySelectorAll('#step1 .item-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
    }

    function selectDesign(val, pr, img, el) {
        order.designType = val;
        order.price = pr;
        document.querySelectorAll('#step2 .item-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
    }

    function nextToStep2() {
        if (!order.baseType) return showAlert("يرجى اختيار نوع اللوحة أولاً");
        goToStep(2);
    }

    function nextToStep3() {
        if (!order.designType) return showAlert("يرجى اختيار (رسمة) أو (عبارة)");
        renderDesignStep();
        goToStep(3);
    }

    function renderDesignStep() {
        const container = document.getElementById('designContainer');
        if (order.designType === 'رسمة') {
            container.innerHTML = `
                <h2>ارسم فكرتك 🎨</h2>
                <div class="drawing-zone">
                    <canvas id="drawCanvas"></canvas>
                    <div class="color-palette" id="drawingPalette"></div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn" style="height:40px; background:#f0f0f0; font-size:12px;" onclick="clearCanvas()">🗑️ مسح الكل</button>
                        <button class="btn" style="height:40px; background:#f0f0f0; font-size:12px;" onclick="setEraser()">🧽 محاية</button>
                        <button class="btn" style="height:40px; background:#6d597a; color:white; font-size:12px;" onclick="askToDownload()">💾 تنزيل الرسمة</button>
                    </div>
                </div>
                <div class="drawing-zone">
                    <p style="font-weight:900; font-size:14px; margin-bottom:5px;">أو ارفع صورة للتطريز:</p>
                    <div class="upload-wrapper">
                        <div class="upload-text">📁 اضغط لرفع صورة</div>
                        <input type="file" id="imgUpload" accept="image/*" onchange="updateUploadText(this)">
                    </div>
                </div>
                <textarea id="userNotes" placeholder="اشرح لنا تفاصيل أكثر عن الرسمة..."></textarea>
            `;
            setTimeout(initDrawing, 100);
        } else {
            container.innerHTML = `
                <h2>تخصيص العبارة ✍️</h2>
                <div class="text-zone">
                    <input type="text" id="targetText" placeholder="اكتب العبارة أو الحروف هنا..." oninput="updateTextPreview(this.value)">
                    <p style="font-size:12px; font-weight:900;">اختر لون الخيط:</p>
                    <div class="color-palette" id="textPalette"></div>
                </div>
                <div class="text-zone">
                    <p style="font-size:12px; font-weight:900;">شكل الإطار الداخلي:</p>
                    <div class="frame-grid">
                        <div class="frame-card" onclick="setFrame('قلب', 'heart-frame.png', this)">
                            <img src="heart-frame.png">
                            <span>قلب</span>
                        </div>
                        <div class="frame-card" onclick="setFrame('معين', 'diamond-frame.png', this)">
                            <img src="diamond-frame.png">
                            <span>معين</span>
                        </div>
                        <div class="frame-card" onclick="setFrame('دائرة', 'circle-frame.png', this)">
                            <img src="circle-frame.png">
                            <span>دائرة</span>
                        </div>
                        <div class="frame-card selected" onclick="setFrame('عشوائي', 'random-frame.png', this)">
                            <img src="random-frame.png">
                            <span>عشوائي</span>
                        </div>
                    </div>
                </div>
                <div class="extra-box" id="extraBox">
                    <span style="font-weight:900; font-size:13px; color: #4a4e69;">إضافة رسمة جانب العبارة (+5 JD)</span>
                    <input type="checkbox" class="checkbox-custom" onchange="toggleExtra(this)">
                </div>
                <textarea id="extraDrawingNotes" placeholder=" (ماذا تريد أن تكون الرسمة)..."></textarea>
            `;
            initTextOptions();
        }
    }

    let canvas, ctx, drawing = false;

    function initDrawing() {
        canvas = document.getElementById('drawCanvas');
        if(!canvas) return;
        ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#000000';
        const palette = document.getElementById('drawingPalette');
        palette.innerHTML = '';
        colors.forEach(colObj => {
            const b = document.createElement('div');
            b.className = 'color-btn';
            b.style.background = colObj.hex;
            if(colObj.hex === '#000000') b.classList.add('active');
            b.onclick = () => { 
                ctx.strokeStyle = colObj.hex; 
                ctx.lineWidth = 4;
                document.querySelectorAll('.color-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
            };
            palette.appendChild(b);
        });
        const getPos = (e) => {
            const r = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - r.left, y: clientY - r.top };
        };
        const start = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
        const move = (e) => { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        const stop = () => { drawing = false; };
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', start, {passive: false});
        canvas.addEventListener('touchmove', move, {passive: false});
        canvas.addEventListener('touchend', stop);
    }

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function setEraser() { ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 20; document.querySelectorAll('.color-btn').forEach(x => x.classList.remove('active')); }

    function askToDownload() {
        showAlert("تأكيد التنزيل", "هل تريد تنزيل هذه الرسمة على جهازك؟", "💾", () => { downloadDrawing(); });
    }

    function downloadDrawing() {
        const link = document.createElement('a');
        link.download = 'design-' + Date.now() + '.png';
        link.href = canvas.toDataURL("image/png");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function updateUploadText(input) {
        const wrapper = input.parentElement.querySelector('.upload-text');
        if (input.files && input.files[0]) {
            wrapper.innerText = "✅ تم اختيار: " + input.files[0].name;
            wrapper.style.color = "#27ae60";
        }
    }

    function initTextOptions() {
        const palette = document.getElementById('textPalette');
        if(!palette) return;
        colors.forEach(colObj => {
            const b = document.createElement('div');
            b.className = 'color-btn';
            b.style.background = colObj.hex;
            if(colObj.hex === order.textColor) b.classList.add('active');
            b.onclick = () => { 
                order.textColor = colObj.hex; 
                order.textColorName = colObj.name;
                document.getElementById('targetText').style.color = colObj.hex;
                document.querySelectorAll('.color-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
            };
            palette.appendChild(b);
        });
    }

    function updateTextPreview(v) { order.textValue = v; }

    function setFrame(f, img, el) {
        order.innerFrame = f;
        document.querySelectorAll('.frame-card').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
    }

    function toggleExtra(cb) { 
        order.extraDrawing = cb.checked; 
        const box = document.getElementById('extraBox');
        const notes = document.getElementById('extraDrawingNotes');
        if(cb.checked) {
            box.classList.add('active');
            notes.style.display = 'block';
        } else {
            box.classList.remove('active');
            notes.style.display = 'none';
            notes.value = ''; // مسح النص إذا تم إلغاء الاختيار
        }
    }

    function prepareInvoice() {
        const notesElem = document.getElementById('userNotes') || document.getElementById('extraDrawingNotes');
        order.notes = notesElem ? notesElem.value : '';
        let totalPrice = order.price + (order.extraDrawing ? 5 : 0);
        
        let html = `
            <div class="inv-line"><span>نوع القاعدة:</span> <span>${order.baseType}</span></div>
            <div class="inv-line"><span>نوع التصميم:</span> <span>${order.designType}</span></div>
        `;

        let detailsForCart = `نوع القاعدة: ${order.baseType}\nنوع التصميم: ${order.designType}`;

        if (order.designType === 'عبارة') {
            const phraseWithColor = `${order.textValue || '---'} (لون: ${order.textColorName})`;
            html += `<div class="inv-line"><span>العبارة:</span> <span style="color:${order.textColor}">${phraseWithColor}</span></div>`;
            html += `<div class="inv-line"><span>الإطار الداخلي:</span> <span>${order.innerFrame}</span></div>`;
            detailsForCart += `\nالعبارة: ${phraseWithColor}\nالإطار الداخلي: ${order.innerFrame}`;
            if (order.extraDrawing) {
                html += `<div class="inv-line"><span>إضافة رسمة:</span> <span>نعم (+5 JD)</span></div>`;
                detailsForCart += `\nإضافة رسمة: نعم (+5 JD)`;
            }
        } else {
            html += `<div class="inv-line"><span>رسم يدوي:</span> <span>تم الحفظ ✅</span></div>`;
            detailsForCart += `\nرسم يدوي: تم الحفظ ✅`;
        }

        if (order.notes) {
            html += `<div class="inv-line"><span>ملاحظات:</span> <span>${order.notes}</span></div>`;
            detailsForCart += `\nملاحظات: ${order.notes}`;
        }

        html += `<div class="inv-total">الإجمالي: ${totalPrice.toFixed(2)} JOD</div>`;

        window.currentCartItem = {
            id: Date.now(),
            name: `تطريز ${order.baseType}`,
            price: totalPrice,
            quantity: 1,
            details: detailsForCart, 
            image: order.designType === 'رسمة' ? 'draw.png' : 'txt.png'
        };

        document.getElementById('invoiceContent').innerHTML = html;
        goToStep(4);
    }

    function confirmOrder() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push(window.currentCartItem);
        localStorage.setItem('cart', JSON.stringify(cart));
        createFallingSewing();
        setTimeout(() => {
            showAlert("تمت الإضافة للسلة!", "سيتم إرسال كافة التفاصيل للواتساب عند إتمام الطلب الرئيسي 🛒", "✅", () => {
                window.location.href = 'page2.html';
            });
        }, 500);
    }

    function createFallingSewing() {
        const items = ['🧵', '🪡', '🧶', '🖼️'];
        for (let i = 0; i < 30; i++) {
            setTimeout(() => {
                const div = document.createElement('div');
                div.className = 'falling-item';
                div.innerHTML = items[Math.floor(Math.random() * items.length)];
                div.style.left = Math.random() * 100 + 'vw';
                div.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 3000);
            }, i * 100);
        }
    }

    function goToStep(s) {
        document.querySelectorAll('.step-content').forEach(c => c.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
        window.scrollTo(0,0);
    }

    function showAlert(title, msg = "", icon = "⚠️", cb = null) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        document.getElementById('proModal').style.display = 'flex';
        window.modalCallback = cb;
    }

    function closeModal() {
        document.getElementById('proModal').style.display = 'none';
        if (window.modalCallback) window.modalCallback();
    }
</script>
</body>
</html>
