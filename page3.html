<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VB8CHYBNCN"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-VB8CHYBNCN');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>قسم الورد - متجر الورد الفاخر</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap');

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none !important; 
            user-select: none; 
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(-45deg, #f8f9ff, #e0c3fc, #8ec5fc, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            overflow-y: auto; 
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .mobile-container { width: 100%; max-width: 420px; padding: 20px; text-align: center; z-index: 10; }

        .glass-box {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 30px 20px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            margin-top: 40px;
        }

        h2 { color: #4a4e69; font-size: 22px; margin-bottom: 20px; font-weight: 900; }

        .step-content { display: none; animation: fadeIn 0.4s ease-out; }
        .step-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item-card {
            background: white; border-radius: 25px; padding: 20px;
            border: 3px solid #6d597a; transition: 0.3s; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin: 0 auto; width: 80%;
        }
        .item-card img { width: 100%; border-radius: 18px; margin-bottom: 8px; }
        .item-card span { font-weight: 800; color: #4a4e69; font-size: 18px; }

        .color-list-wrapper { position: relative; }
        .color-list-scroll {
            max-height: 300px; overflow-y: auto; padding: 5px;
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;
            scroll-behavior: smooth;
        }
        .scroll-hint {
            font-size: 12px; color: #6d597a; font-weight: 700;
            margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 5px;
        }

        .color-item {
            background: white; border-radius: 20px; padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .color-meta { display: flex; align-items: center; gap: 12px; }
        .color-sample { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #eee; }

        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 10px; }
        .color-option { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .color-circle {
            width: 100%; aspect-ratio: 1/1; border-radius: 20px; border: 4px solid white;
            cursor: pointer; transition: 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .color-circle.selected { transform: scale(1.05); border-color: #6d597a; }
        .color-name-label { font-size: 12px; font-weight: 700; color: #4a4e69; }

        .counter-controls { display: flex; align-items: center; gap: 12px; }
        .c-btn {
            width: 32px; height: 32px; border-radius: 10px; border: none;
            background: #6d597a; color: white; font-weight: bold; font-size: 18px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .c-val { font-weight: 900; color: #6d597a; font-size: 16px; min-width: 25px; text-align: center; }

        .btn-group { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 25px; }
        .btn {
            flex: 1; height: 60px; border-radius: 22px; font-family: 'Cairo';
            font-weight: 900; font-size: 17px; cursor: pointer; border: none;
            min-width: 120px;
        }
        .btn-next { background: linear-gradient(135deg, #6d597a, #4a4e69); color: white; }
        .btn-back { background: white; color: #6d597a; border: 2px solid #6d597a; }

        .receipt-container { background: #fdfaff; padding: 20px; border-radius: 25px; border: 1px solid #eee; text-align: right; }
        .receipt-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 700; color: #4a4e69; }
        .total-price { 
            font-size: 22px; color: #6d597a; border-top: 3px dashed #e0c3fc; 
            margin-top: 15px; padding-top: 15px; text-align: center; font-weight: 900;
        }
        .price-hint { font-size: 11px; color: #888; text-align: right; padding: 5px 10px; }

        #proModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 10001; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .pro-modal-box {
            background: white; padding: 30px; border-radius: 35px; text-align: center;
            width: 85%; max-width: 350px; animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
        .pro-modal-icon { font-size: 50px; margin-bottom: 15px; display: block; }
        .pro-modal-btn {
            background: #6d597a; color: white; border: none; width: 100%; padding: 15px;
            border-radius: 18px; font-family: 'Cairo'; font-weight: 900; margin-top: 20px; cursor: pointer;
        }

        .falling-rose {
            position: fixed; top: -50px; z-index: 9999;
            pointer-events: none; animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="glass-box">
        
        <div id="step1" class="step-content active">
            <h2>شكل الورد المميز 🌸</h2>
            <div class="item-card">
                <img src="jory.png" onerror="this.src='https://via.placeholder.com/150?text=الجوري'"><span class="rose-name">ورد جوري فاخر</span>
            </div>
            <div class="btn-group">
                <button class="btn btn-back" onclick="window.location.href='page2.html'">عودة</button>
                <button class="btn btn-next" onclick="goToStep(2)">التالي</button>
            </div>
        </div>

        <div id="step2" class="step-content">
            <h2>لون وكمية الورد 🎨</h2>
            <p id="totalRoseLabel" style="font-weight: 900; color: #6d597a; margin-bottom: 10px;">المجموع: 0 وردة</p>
            
            <div class="color-list-wrapper">
                <div class="scroll-hint">🔽 اسحب لرؤية المزيد من الألوان</div>
                <div class="color-list-scroll" id="colorList"></div>
            </div>

            <p class="price-hint">* أقل كمية للطلب 7 وردات بسعر 5 JOD</p>
            <p class="price-hint">* الإضافة فوق الـ 7: كل 3 وردات بـ 1 JOD إضافي</p>
            
            <div class="btn-group">
                <button class="btn btn-back" onclick="goToStep(1)">عودة</button>
                <button class="btn btn-next" onclick="validateStep2()">التالي</button>
            </div>
        </div>

        <div id="step3" class="step-content">
            <h2>لون البوكيه 🎀</h2>
            <div class="color-grid" id="wrapColors">
                <div class="color-option">
                    <div class="color-circle" style="background:#5f27cd" data-name="بنفسجي" onclick="selectWrap('بنفسجي', this)"></div>
                    <span class="color-name-label">بنفسجي</span>
                </div>
                <div class="color-option">
                    <div class="color-circle" style="background:#81ecec" data-name="ازرق فاتح" onclick="selectWrap('ازرق فاتح', this)"></div>
                    <span class="color-name-label">ازرق فاتح</span>
                </div>
                <div class="color-option">
                    <div class="color-circle" style="background:#ffffff" data-name="ابيض" onclick="selectWrap('ابيض', this)"></div>
                    <span class="color-name-label">ابيض</span>
                </div>
                <div class="color-option">
                    <div class="color-circle" style="background:#ff9ff3" data-name="زهري" onclick="selectWrap('زهري', this)"></div>
                    <span class="color-name-label">زهري</span>
                </div>
                <div class="color-option">
                    <div class="color-circle" style="background:#2d3436" data-name="اسود" onclick="selectWrap('اسود', this)"></div>
                    <span class="color-name-label">اسود</span>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-back" onclick="goToStep(2)">عودة</button>
                <button class="btn btn-next" onclick="calculateInvoice()">الفاتورة</button>
            </div>
        </div>

        <div id="step5" class="step-content">
            <h2>ملخص طلبك 🧾</h2>
            <div id="invoiceContent"></div>
            <div class="btn-group">
                <button class="btn btn-back" onclick="goToStep(3)">تعديل</button>
                <button class="btn btn-next" onclick="confirmAndStore()">تأكيد وإضافة للسلة</button>
            </div>
        </div>

    </div>
</div>

<div id="proModal">
    <div class="pro-modal-box">
        <span id="modalIcon" class="pro-modal-icon">⚠️</span>
        <h2 id="modalTitle" style="margin:0; color:#4a4e69">تنبيه</h2>
        <p id="modalMsg" style="font-weight:700; margin-top:10px; color:#666;"></p>
        <button id="modalBtn" class="pro-modal-btn" onclick="closeProModal()">حسناً</button>
    </div>
</div>

<script>
    const roseColorsHex = {
        "بنفسجي غامق": "#4834d4",
        "بنفسجي متوسط": "#686de0",
        "بنفسجي فاتح": "#a29bfe",
        "احمر": "#eb4d4b",
        "سكني": "#95afc0",
        "اصفر": "#f9ca24",
        "ذهبي": "#f0932b",
        "ازرق فاتح": "#7ed6df"
    };

    let orderData = {
        type: 'ورد جوري',
        roseColors: {},
        wrapColor: '',
        totalRoses: 0,
        finalPrice: 0
    };

    function showProAlert(title, msg, icon = '⚠️', callback = null) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        document.getElementById('modalIcon').innerText = icon;
        const modal = document.getElementById('proModal');
        modal.style.display = 'flex';
        
        document.getElementById('modalBtn').onclick = function() {
            closeProModal();
            if(callback) callback();
        };
    }

    function closeProModal() {
        document.getElementById('proModal').style.display = 'none';
    }

    function initColors() {
        const container = document.getElementById('colorList');
        container.innerHTML = '';
        Object.keys(roseColorsHex).forEach(c => {
            orderData.roseColors[c] = 0;
            const item = document.createElement('div');
            item.className = 'color-item';
            item.innerHTML = `
                <div class="color-meta">
                    <div class="color-sample" style="background:${roseColorsHex[c]}"></div>
                    <span>${c}</span>
                </div>
                <div class="counter-controls">
                    <button class="c-btn" onclick="changeQty('${c}', -1)">-</button>
                    <span class="c-val" id="val-${c}">0</span>
                    <button class="c-btn" onclick="changeQty('${c}', 1)">+</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function changeQty(color, amt) {
        orderData.roseColors[color] = Math.max(0, orderData.roseColors[color] + amt);
        document.getElementById(`val-${color}`).innerText = orderData.roseColors[color];
        updateTotal();
    }

    function updateTotal() {
        let sum = 0;
        Object.values(orderData.roseColors).forEach(v => sum += v);
        orderData.totalRoses = sum;
        document.getElementById('totalRoseLabel').innerText = "المجموع: " + sum + " وردة 💐";
    }

    function validateStep2() {
        if(orderData.totalRoses < 7) {
            showProAlert("تنبيه الكمية", "عذراً، أقل كمية للطلب هي 7 وردات");
            return;
        }
        let extra = orderData.totalRoses - 7;
        if(extra > 0 && extra % 3 !== 0) {
            showProAlert("تنسيق الكمية", "الزيادة فوق الـ 7 وردات يجب أن تكون من مضاعفات الـ 3 (مثل 10، 13، 16..)");
            return;
        }
        goToStep(3);
    }

    function selectWrap(val, el) {
        orderData.wrapColor = val;
        document.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
    }

    function goToStep(s) {
        document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
        const stepEl = document.getElementById('step'+s);
        if(stepEl) stepEl.classList.add('active');
        window.scrollTo(0,0);
    }

    function calculateInvoice() {
        if(!orderData.wrapColor) { 
            showProAlert("اختيار اللون", "يرجى اختيار لون غلاف البوكيه أولاً");
            return; 
        }
        
        let basePrice = 5;
        let extraRoses = orderData.totalRoses - 7;
        let extraPrice = (extraRoses / 3) * 1;
        orderData.finalPrice = basePrice + extraPrice;

        // بناء HTML للمعاينة في صفحة الورد
        let html = `<div class="receipt-container">`;
        html += `<div class="receipt-line"><span>النوع:</span> <span>${orderData.type}</span></div>`;
        html += `<div class="receipt-line"><span>لون الغلاف:</span> <span>${orderData.wrapColor}</span></div>`;
        html += `<hr style="border:0; border-top:1px dashed #ccc; margin:10px 0;">`;
        
        // بناء نص التفاصيل المنظم بأسطر جديدة للسلة
        let detailsText = `النوع: ${orderData.type}\nلون الغلاف: ${orderData.wrapColor}\nالألوان المختارة:`;

        Object.keys(orderData.roseColors).forEach(c => {
            if(orderData.roseColors[c] > 0) {
                html += `<div class="receipt-line"><span>${c}:</span> <span>${orderData.roseColors[c]} وردة</span></div>`;
                detailsText += `\n- ${c}: ${orderData.roseColors[c]} وردة`;
            }
        });

        html += `<div class="total-price">المجموع الكلي: ${orderData.finalPrice.toFixed(2)} JOD</div>`;
        html += `</div>`;
        
        // تخزين النص المنظم مؤقتاً لاستخدامه في confirmAndStore
        window.roseDetailsForCart = detailsText;
        
        document.getElementById('invoiceContent').innerHTML = html;
        goToStep(5);
    }

    function confirmAndStore() {
        let cartItem = {
            id: 'flower_' + Date.now(),
            name: "🌸 بوكيه ورد جوري مخصص",
            price: parseFloat(orderData.finalPrice),
            quantity: orderData.totalRoses,
            details: window.roseDetailsForCart, // استخدام النص المنظم بأسطر \n
            image: 'jory.png'
        };

        let currentCart = [];
        try {
            const savedCart = localStorage.getItem('cart');
            currentCart = savedCart ? JSON.parse(savedCart) : [];
        } catch (e) {
            currentCart = [];
        }
        
        currentCart.push(cartItem);
        localStorage.setItem('cart', JSON.stringify(currentCart));

        createFallingRoses();
        setTimeout(() => {
            showProAlert("رائع!", "تمت إضافة طلبك إلى السلة بنجاح 🛒", "✅", () => {
                window.location.href = 'page2.html';
            });
        }, 500);
    }

    function createFallingRoses() {
        for (let i = 0; i < 30; i++) {
            setTimeout(() => {
                const rose = document.createElement('div');
                rose.className = 'falling-rose';
                rose.innerHTML = '🌸';
                rose.style.left = Math.random() * 100 + 'vw';
                rose.style.fontSize = (Math.random() * 20 + 20) + 'px';
                rose.style.animationDuration = (Math.random() * 2 + 2) + 's';
                rose.style.opacity = Math.random();
                document.body.appendChild(rose);
                setTimeout(() => rose.remove(), 4000);
            }, i * 100);
        }
    }

    window.addEventListener('DOMContentLoaded', initColors);
</script>
</body>
</html>
