<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>قسم الورد - الشسمو للورد</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap');

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none !important; 
            user-select: none; 
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(-45deg, #f8f9ff, #e0c3fc, #8ec5fc, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            overflow-y: auto; 
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            transition: opacity 0.5s;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .mobile-container { width: 100%; max-width: 420px; padding: 20px; text-align: center; }

        .lang-switch-btn {
            position: fixed; top: 15px; right: 15px; z-index: 9999;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border: 2px solid #fff; padding: 8px 15px; border-radius: 15px;
            font-weight: 900; color: #4a4e69; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            font-size: 14px;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 30px 20px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            margin-top: 40px;
        }

        h2 { color: #4a4e69; font-size: 22px; margin-bottom: 20px; font-weight: 900; }

        .step-content { display: none; animation: fadeIn 0.4s ease-out; }
        .step-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .item-card {
            background: white; border-radius: 25px; padding: 10px;
            border: 3px solid transparent; transition: 0.3s; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .item-card img { width: 100%; border-radius: 18px; margin-bottom: 8px; }
        .item-card.selected { border-color: #6d597a; background: #fdfaff; transform: scale(1.02); }
        .item-card span { font-weight: 800; color: #4a4e69; font-size: 14px; }

        .color-list-scroll {
            max-height: 320px; overflow-y: auto; padding: 5px;
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;
        }
        .color-item {
            background: white; border-radius: 20px; padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .color-meta { display: flex; align-items: center; gap: 12px; }
        .color-sample { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #eee; }

        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .color-circle {
            height: 60px; border-radius: 20px; border: 4px solid white;
            cursor: pointer; transition: 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .color-circle.selected { transform: scale(1.1); border-color: #6d597a; }

        .small-counter {
            background: white; border-radius: 20px; padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .counter-label { font-weight: 800; color: #4a4e69; font-size: 15px; }
        .counter-controls { display: flex; align-items: center; gap: 12px; }
        .c-btn {
            width: 30px; height: 30px; border-radius: 8px; border: none;
            background: #6d597a; color: white; font-weight: bold; font-size: 18px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .c-val { font-weight: 900; color: #6d597a; font-size: 16px; min-width: 25px; text-align: center; }

        .list-option {
            background: white; margin-bottom: 12px; padding: 18px;
            border-radius: 22px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; font-weight: 800; color: #4a4e69;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .list-option.selected { background: #6d597a !important; color: white !important; }

        .btn-group { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 25px; }
        .btn {
            flex: 1; height: 60px; border-radius: 22px; font-family: 'Cairo';
            font-weight: 900; font-size: 17px; cursor: pointer; border: none;
            min-width: 120px;
        }
        .btn-next { background: linear-gradient(135deg, #6d597a, #4a4e69); color: white; }
        .btn-back { background: white; color: #6d597a; border: 2px solid #6d597a; }

        .receipt-container { background: #fdfaff; padding: 20px; border-radius: 25px; border: 1px solid #eee; text-align: right; }
        .receipt-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 700; color: #4a4e69; }
        .total-price { 
            font-size: 24px; color: #6d597a; border-top: 3px dashed #e0c3fc; 
            margin-top: 15px; padding-top: 15px; text-align: center; font-weight: 900;
        }
        .price-hint { font-size: 11px; color: #888; margin-top: -8px; margin-bottom: 15px; text-align: right; padding-right: 10px; }
    </style>
</head>
<body>

<div class="lang-switch-btn" onclick="toggleLanguage()" id="langBtn">EN</div>

<div class="mobile-container">
    <div class="glass-box">
        
        <div id="step1" class="step-content active">
            <h2 id="h2-step1">اختر شكل الورد 🌸</h2>
            <div class="grid-options">
                <div class="item-card" onclick="selectItem('type', 'rose1', this)">
                    <img src="rose1.png" onerror="this.src='https://via.placeholder.com/150?text=Rose1'"><span class="rose-name">الوردة 1</span>
                </div>
                <div class="item-card" onclick="selectItem('type', 'rose2', this)">
                    <img src="rose2.png" onerror="this.src='https://via.placeholder.com/150?text=Rose2'"><span class="rose-name">الوردة 2</span>
                </div>
                <div class="item-card" onclick="selectItem('type', 'rose3', this)">
                    <img src="rose3.png" onerror="this.src='https://via.placeholder.com/150?text=Rose3'"><span class="rose-name">الوردة 3</span>
                </div>
                <div class="item-card" onclick="selectItem('type', 'rose4', this)">
                    <img src="rose4.png" onerror="this.src='https://via.placeholder.com/150?text=Rose4'"><span class="rose-name">الوردة 4</span>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-back btn-back-text" onclick="window.location.href='page2.html'">عودة</button>
                <button class="btn btn-next btn-next-text" onclick="validateStep(1, 2)">التالي</button>
            </div>
        </div>

        <div id="step2" class="step-content">
            <h2 id="h2-step2">لون وكمية الورد 🎨</h2>
            <p id="totalRoseLabel" style="font-weight: 900; color: #6d597a; margin-bottom: 10px;">المجموع: 0 وردة</p>
            
            <div class="color-list-scroll" id="colorList"></div>

            <p class="price-hint" id="hint-rose">* أقل كمية 10 وردات والزيادة من مضاعفات الـ 5</p>
            <div class="btn-group">
                <button class="btn btn-back btn-back-text" onclick="goToStep(1)">عودة</button>
                <button class="btn btn-next btn-next-text" onclick="validateStep2()">التالي</button>
            </div>
        </div>

        <div id="step3" class="step-content">
            <h2 id="h2-step3">لون الغلاف 🎀</h2>
            <div class="color-grid">
                <div class="color-circle" style="background:#000" onclick="selectItem('wrapColor', 'black', this)"></div>
                <div class="color-circle" style="background:#ffffff" onclick="selectItem('wrapColor', 'white', this)"></div>
                <div class="color-circle" style="background:#e0c3fc" onclick="selectItem('wrapColor', 'lavender', this)"></div>
                <div class="color-circle" style="background:#ff9ff3" onclick="selectItem('wrapColor', 'pink', this)"></div>
                <div class="color-circle" style="background:#54a0ff" onclick="selectItem('wrapColor', 'sky', this)"></div>
                <div class="color-circle" style="background:#feca57" onclick="selectItem('wrapColor', 'gold', this)"></div>
                <div class="color-circle" style="background:#ee5253" onclick="selectItem('wrapColor', 'rose_red', this)"></div>
                <div class="color-circle" style="background:#576574" onclick="selectItem('wrapColor', 'grey', this)"></div>
                <div class="color-circle" style="background:#222f3e" onclick="selectItem('wrapColor', 'dark_blue', this)"></div>
                <div class="color-circle" style="background:#10ac84" onclick="selectItem('wrapColor', 'emerald', this)"></div>
                <div class="color-circle" style="background:#5f27cd" onclick="selectItem('wrapColor', 'deep_purple', this)"></div>
                <div class="color-circle" style="background:#ff9f43" onclick="selectItem('wrapColor', 'peach', this)"></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-back btn-back-text" onclick="goToStep(2)">عودة</button>
                <button class="btn btn-next btn-next-text" onclick="validateStep(3, 4)">التالي</button>
            </div>
        </div>

        <div id="step4" class="step-content">
            <h2 id="h2-step4">الإضافات ✨</h2>
            
            <div class="list-option" id="foamOpt" onclick="toggleExtra('foam', 0.5, this)">
                <span id="opt-foam">☁️ إضافة فلين أبيض</span><span>+0.5 JOD</span>
            </div>
            <div class="list-option" id="butterOpt" onclick="toggleExtra('butterfly', 1, this)">
                <span id="opt-butterfly">🦋 إضافة فراشات</span><span>+1 JOD</span>
            </div>

            <div class="small-counter">
                <div class="counter-label" id="lbl-choco">إضافة شوكولاتة 🍫</div>
                <div class="counter-controls">
                    <button class="c-btn" onclick="changeChoco(-1)">-</button>
                    <span class="c-val" id="chocoVal">0</span>
                    <button class="c-btn" onclick="changeChoco(1)">+</button>
                </div>
            </div>
            <p class="price-hint" id="hint-choco">* الحبة بـ ربع دينار</p>

            <div class="btn-group">
                <button class="btn btn-back btn-back-text" onclick="goToStep(3)">عودة</button>
                <button class="btn btn-next" id="btn-invoice" onclick="calculateInvoice()">الفاتورة</button>
            </div>
        </div>

        <div id="step5" class="step-content">
            <h2 id="h2-step5">ملخص طلبك 🧾</h2>
            <div id="invoiceContent"></div>
            <div class="btn-group">
                <button class="btn btn-back" id="btn-edit" onclick="goToStep(4)">تعديل</button>
                <button class="btn btn-next" id="btn-confirm" onclick="confirmAndStore()">تأكيد</button>
            </div>
        </div>

    </div>
</div>

<script>
    const translations = {
        ar: {
            lang: "EN", step1: "اختر شكل الورد 🌸", step2: "لون وكمية الورد 🎨", step3: "لون الغلاف 🎀", step4: "الإضافات ✨", step5: "ملخص طلبك 🧾",
            roses: ["الوردة 1", "الوردة 2", "الوردة 3", "الوردة 4"], back: "عودة", next: "التالي", invoice: "الفاتورة", edit: "تعديل", confirm: "تأكيد",
            alert1: "يرجى اختيار شكل الورد", alert2: "لازم يوصل العدد عشرة", alert2_step: "الزيادة من خمسة", alert3: "يرجى اختيار لون الغلاف",
            colors: {
                red: "أحمر", white: "أبيض", green: "أخضر", blue: "أزرق", yellow: "أصفر", purple: "بنفسجي", pink: "زهري", orange: "برتقالي", maroon: "خمري", teal: "تركواز", navy: "كحلي", silver: "فضي",
                black: "أسود", lavender: "ليلكي", sky: "سماوي", gold: "ذهبي", rose_red: "أحمر وردي", grey: "رمادي", dark_blue: "أزرق غامق", emerald: "زمردي", deep_purple: "بنفسجي غامق", peach: "خوخي"
            }
        },
        en: {
            lang: "AR", step1: "Flower Shape 🌸", step2: "Colors & Qty 🎨", step3: "Wrap Color 🎀", step4: "Extras ✨", step5: "Summary 🧾",
            roses: ["Rose 1", "Rose 2", "Rose 3", "Rose 4"], back: "Back", next: "Next", invoice: "Invoice", edit: "Edit", confirm: "Confirm",
            alert1: "Please pick a shape", alert2: "Must reach ten flowers", alert2_step: "Increments must be by five", alert3: "Please pick wrap color",
            colors: {
                red: "Red", white: "White", green: "Green", blue: "Blue", yellow: "Yellow", purple: "Purple", pink: "Pink", orange: "Orange", maroon: "Maroon", teal: "Teal", navy: "Navy", silver: "Silver",
                black: "Black", lavender: "Lavender", sky: "Sky Blue", gold: "Gold", rose_red: "Rose Red", grey: "Grey", dark_blue: "Dark Blue", emerald: "Emerald", deep_purple: "Deep Purple", peach: "Peach"
            }
        }
    };

    const colorHex = {
        red: "#ff4d4d", white: "#ffffff", green: "#2ecc71", blue: "#3498db", yellow: "#f1c40f", purple: "#9b59b6",
        pink: "#ff9ff3", orange: "#e67e22", maroon: "#c0392b", teal: "#1abc9c", navy: "#34495e", silver: "#bdc3c7"
    };

    let orderData = {
        type: '', roseColors: {}, wrapColor: '', totalRoses: 0, chocoQty: 0,
        extras: { butterfly: 0, foam: 0 }
    };

    function initColors() {
        const container = document.getElementById('colorList');
        container.innerHTML = '';
        const lang = document.documentElement.lang || 'ar';
        
        Object.keys(colorHex).forEach(c => {
            if (orderData.roseColors[c] === undefined) orderData.roseColors[c] = 0;
            const item = document.createElement('div');
            item.className = 'color-item';
            item.innerHTML = `
                <div class="color-meta">
                    <div class="color-sample" style="background:${colorHex[c]}"></div>
                    <span>${translations[lang].colors[c]}</span>
                </div>
                <div class="counter-controls">
                    <button class="c-btn" onclick="changeRoseColor('${c}', -1)">-</button>
                    <span class="c-val" id="val-${c}">${orderData.roseColors[c]}</span>
                    <button class="c-btn" onclick="changeRoseColor('${c}', 1)">+</button>
                </div>
            `;
            container.appendChild(item);
        });
        updateTotalRoses();
    }

    function changeRoseColor(color, amt) {
        orderData.roseColors[color] = Math.max(0, orderData.roseColors[color] + amt);
        document.getElementById(`val-${color}`).innerText = orderData.roseColors[color];
        updateTotalRoses();
    }

    function updateTotalRoses() {
        let sum = 0;
        Object.values(orderData.roseColors).forEach(v => sum += v);
        orderData.totalRoses = sum;
        const lang = document.documentElement.lang || 'ar';
        document.getElementById('totalRoseLabel').innerText = (lang === 'en' ? "Total: " : "المجموع: ") + sum + " 💐";
    }

    function changeChoco(amt) {
        orderData.chocoQty = Math.max(0, orderData.chocoQty + amt);
        document.getElementById('chocoVal').innerText = orderData.chocoQty;
    }

    function selectItem(field, val, el) {
        orderData[field] = val;
        el.parentElement.querySelectorAll('.item-card, .color-circle').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
    }

    function toggleExtra(name, price, el) {
        if(orderData.extras[name] === 0) { orderData.extras[name] = price; el.classList.add('selected'); }
        else { orderData.extras[name] = 0; el.classList.remove('selected'); }
    }

    function validateStep(curr, next) {
        const t = translations[document.documentElement.lang || 'ar'];
        if(curr==1 && !orderData.type) { alert(t.alert1); return; }
        if(curr==3 && !orderData.wrapColor) { alert(t.alert3); return; }
        goToStep(next);
    }

    function validateStep2() {
        const t = translations[document.documentElement.lang || 'ar'];
        if(orderData.totalRoses < 10) { alert(t.alert2); return; }
        if(orderData.totalRoses > 10 && orderData.totalRoses % 5 !== 0) { alert(t.alert2_step); return; }
        goToStep(3);
    }

    function goToStep(s) {
        document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
        window.scrollTo(0,0);
    }

    function calculateInvoice() {
        const lang = document.documentElement.lang || 'ar';
        const t = translations[lang];
        
        let basePrice = 6 + (((orderData.totalRoses - 10) / 5) * 3);
        let chocoTotal = orderData.chocoQty * 0.25;
        let total = basePrice + chocoTotal + orderData.extras.butterfly + orderData.extras.foam;

        const roseNameMap = { rose1: t.roses[0], rose2: t.roses[1], rose3: t.roses[2], rose4: t.roses[3] };
        const translatedType = roseNameMap[orderData.type] || orderData.type;

        let detailsForCart = `الشكل: ${translatedType} | `;
        let html = `<div class="receipt-container">`;
        html += `<div class="receipt-line"><span>الشكل:</span> <span>${translatedType}</span></div>`;
        html += `<hr style="border:0; border-top:1px dashed #eee;">`;
        
        Object.keys(orderData.roseColors).forEach(c => {
            if(orderData.roseColors[c] > 0) {
                html += `<div class="receipt-line"><span>لون ${t.colors[c]}:</span> <span>${orderData.roseColors[c]} وردة</span></div>`;
                detailsForCart += `لون ${t.colors[c]}: ${orderData.roseColors[c]} | `;
            }
        });

        html += `<div class="receipt-line"><span>لون الغلاف:</span> <span>${t.colors[orderData.wrapColor] || orderData.wrapColor}</span></div>`;
        detailsForCart += `الغلاف: ${t.colors[orderData.wrapColor] || orderData.wrapColor} | `;
        html += `<hr style="border:0; border-top:1px solid #eee; margin:10px 0;">`;
        
        if(orderData.chocoQty > 0) {
            html += `<div class="receipt-line"><span>شوكولاتة:</span> <span>${orderData.chocoQty} حبة</span></div>`;
            detailsForCart += `شوكولاتة: ${orderData.chocoQty} | `;
        }
        if(orderData.extras.foam > 0) {
            html += `<div class="receipt-line"><span>فلين أبيض:</span> <span>0.50 JOD</span></div>`;
            detailsForCart += `فلين: نعم | `;
        }
        if(orderData.extras.butterfly > 0) {
            html += `<div class="receipt-line"><span>فراشات:</span> <span>1.00 JOD</span></div>`;
            detailsForCart += `فراشات: نعم | `;
        }
        
        html += `<div class="total-price">المجموع الكلي: ${total.toFixed(2)} JOD</div>`;
        html += `</div>`;

        let cartItem = {
            id: 'flower_' + Date.now(),
            name: "بوكيه ورد مخصص",
            qty: orderData.totalRoses,
            price: total.toFixed(2),
            details: detailsForCart + ` الإجمالي: ${total.toFixed(2)} JOD`
        };
        sessionStorage.setItem('flower_order', JSON.stringify(cartItem));

        document.getElementById('invoiceContent').innerHTML = html;
        goToStep(5);
    }

    function toggleLanguage() {
        const html = document.documentElement;
        const currentLang = html.getAttribute('lang') || 'ar';
        const newLang = currentLang === 'ar' ? 'en' : 'ar';
        html.setAttribute('lang', newLang);
        html.setAttribute('dir', newLang === 'ar' ? 'rtl' : 'ltr');
        
        document.getElementById('langBtn').innerText = translations[newLang].lang;
        document.getElementById('h2-step1').innerText = translations[newLang].step1;
        document.getElementById('h2-step2').innerText = translations[newLang].step2;
        document.getElementById('h2-step3').innerText = translations[newLang].step3;
        document.getElementById('h2-step4').innerText = translations[newLang].step4;
        document.getElementById('h2-step5').innerText = translations[newLang].step5;
        
        initColors(); 
    }

    function confirmAndStore() {
        alert("تمت الإضافة إلى السلة بنجاح! 🛒");
        window.location.href = 'page2.html';
    }

    window.addEventListener('DOMContentLoaded', initColors);
</script>
</body>
</html>
