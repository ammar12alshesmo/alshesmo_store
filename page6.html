<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>سلة المشتريات - الشسمو</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none !important; user-select: none; }

        body {
            font-family: 'Cairo', sans-serif; margin: 0; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
            background: linear-gradient(-45deg, #f8f9ff, #e0c3fc, #8ec5fc, #fbc2eb);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            min-height: 100vh; display: flex; justify-content: center;
            overflow-x: hidden;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .mobile-container { width: 100%; max-width: 450px; position: relative; z-index: 2; }
        
        .lang-switch-btn {
            position: fixed; top: 15px; right: 15px; z-index: 10001;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border: 2px solid #fff; padding: 8px 15px; border-radius: 15px;
            font-weight: 900; color: #4a4e69; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            font-size: 14px;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border-radius: 40px; padding: 30px 20px; border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center;
            margin-top: 40px;
        }

        .cart-section {
            background: white; border-radius: 25px; padding: 20px;
            margin-bottom: 20px; position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            animation: fadeIn 0.4s ease-out;
            text-align: right;
        }

        .delete-btn {
            position: absolute; top: 15px; background: #ffeded;
            color: #ff4d4d; border: none; width: 30px; height: 30px;
            border-radius: 10px; font-weight: 900; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        html[dir="rtl"] .delete-btn { left: 15px; }
        html[dir="ltr"] .delete-btn { right: 15px; }

        .section-title { color: #6d597a; font-weight: 900; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .invoice-card {
            background: #fdfaff; border: 1px dashed #e0c3fc;
            border-radius: 15px; padding: 15px; margin-top: 10px;
        }
        .invoice-line {
            display: flex; justify-content: space-between; font-size: 13px;
            color: #4a4e69; margin-bottom: 6px; border-bottom: 1px solid rgba(0,0,0,0.03);
            padding-bottom: 4px;
        }
        .invoice-line b { color: #6d597a; }

        .item-price-row { 
            display: flex; justify-content: space-between; margin-top: 15px; 
            font-weight: 900; border-top: 2px solid #f0f0f0; padding-top: 10px; 
            color: #4a4e69; font-size: 16px;
        }

        .promo-box {
            background: white; border-radius: 20px; padding: 10px;
            margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: flex; gap: 10px; align-items: center; border: 1px solid #eee;
            position: relative;
        }
        .promo-input {
            flex: 1; height: 45px; border-radius: 15px; border: 2px solid #f0f0f0;
            padding: 0 15px; font-family: 'Cairo'; font-weight: 800; color: #4a4e69;
        }
        .promo-btn {
            background: #6d597a; color: white; border: none; padding: 0 20px;
            height: 45px; border-radius: 15px; font-family: 'Cairo'; font-weight: 900;
            cursor: pointer; font-size: 14px;
        }

        /* تنسيق زر الحذف الجديد للخصم */
        .remove-promo-btn {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            background: #ff4d4d; color: white; border: none; width: 22px; height: 22px;
            border-radius: 50%; font-weight: bold; font-size: 12px; cursor: pointer;
            display: none; align-items: center; justify-content: center; z-index: 10;
        }
        html[dir="ltr"] .remove-promo-btn { left: auto; right: 85px; }

        .total-box { 
            background: #4a4e69; color: white; border-radius: 25px; 
            padding: 20px; display: flex; justify-content: space-between; 
            font-weight: 900; font-size: 18px; margin-top: 20px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .btn { width: 100%; height: 65px; border-radius: 25px; font-family: 'Cairo'; font-weight: 900; border: none; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .btn-send { background: #6d597a; color: white; box-shadow: 0 10px 20px rgba(109,89,122,0.3); }
        .btn-back { background: white; color: #6d597a; border: 2px solid #6d597a; }

        .flower {
            position: fixed; top: -50px; z-index: 1;
            font-size: 24px; pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }

        .falling-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(109, 89, 122, 0.95); color: white; padding: 25px 40px;
            border-radius: 30px; font-weight: 900; font-size: 22px; z-index: 10002;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); display: none; backdrop-filter: blur(5px);
            animation: popOut 3s forwards;
        }
        @keyframes popOut { 
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 
            20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 
            100% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="lang-switch-btn" onclick="toggleLanguage()" id="langBtn">EN</div>
    <div id="successPopup" class="falling-text">تم خصم 10% ✨</div>

    <div class="mobile-container">
        <div class="glass-box">
            <h2 id="pageTitle">سلة المشتريات 🛒</h2>
            
            <div id="cartContent"></div>

            <div id="actionArea">
                <div id="promoContainer">
                    <div class="promo-box">
                        <input type="text" id="promoInput" class="promo-input" placeholder="كود الخصم">
                        <button class="remove-promo-btn" id="removePromoBtn" onclick="removePromo()">×</button>
                        <button class="promo-btn" id="promoBtn" onclick="applyPromo()">تطبيق</button>
                    </div>
                    <div id="promoMsg" style="font-size:12px; font-weight:800; margin-top:-15px; margin-bottom:15px;"></div>
                </div>

                <div id="summaryBox">
                    <div class="total-box">
                        <span id="totalText">المجموع النهائي:</span>
                        <span id="finalTotal">0.00 د.أ</span>
                    </div>
                    <button class="btn btn-send" id="submitBtn" style="margin-top:15px;" onclick="goToPage7()">إرسال الطلب ✨</button>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-back" id="addMoreBtn" onclick="window.location.href='page2.html'">➕ إضافة منتج آخر</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const i18n = {
        ar: {
            title: "سلة المشتريات 🛒", total: "المجموع النهائي:", send: "إرسال الطلب ✨",
            addMore: "➕ إضافة منتج آخر", empty: "السلة فارغة حالياً 🧺", confirmDelete: "هل تريد حذف هذا الطلب؟",
            currency: "د.أ", price: "السعر:", flowerTitle: '🌸 قسم الورد والشوكولاتة',
            embroideryTitle: '🪡 قسم التطريز', stickerTitle: '✨ قسم الستيكرات',
            qtyLabel: "الكمية:", roses: "وردة", details: "تفاصيل الفاتورة:",
            popText: "تم خصم 10% ✨", invalid: "كود غير صحيح!", used: "استخدمت هذا الكود مسبقاً"
        },
        en: {
            title: "Shopping Cart 🛒", total: "Final Total:", send: "Send Order ✨",
            addMore: "➕ Add Another", empty: "Cart is empty 🧺", confirmDelete: "Remove item?",
            currency: "JOD", price: "Price:", flowerTitle: '🌸 Flowers Section',
            embroideryTitle: '🪡 Embroidery', stickerTitle: '✨ Stickers',
            qtyLabel: "Quantity:", roses: "Roses", details: "Invoice Details:",
            popText: "10% Discount Applied! ✨", invalid: "Invalid code!", used: "Already used!"
        }
    };

    let currentLang = 'ar';
    let isPromoApplied = sessionStorage.getItem('promo_applied') === 'true';

    function createFlower() {
        const flower = document.createElement('div');
        flower.className = 'flower';
        flower.innerText = ['🌸', '🌹', '🌺', '🌷', '🌼'][Math.floor(Math.random() * 5)];
        flower.style.left = Math.random() * 100 + 'vw';
        flower.style.animationDuration = (Math.random() * 2 + 3) + 's';
        flower.style.opacity = Math.random();
        document.body.appendChild(flower);
        setTimeout(() => flower.remove(), 6000);
    }

    function toggleLanguage() {
        currentLang = (currentLang === 'ar') ? 'en' : 'ar';
        document.documentElement.dir = (currentLang === 'ar') ? "rtl" : "ltr";
        document.getElementById('langBtn').innerText = (currentLang === 'ar') ? "EN" : "AR";
        document.getElementById('successPopup').innerText = i18n[currentLang].popText;
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cartContent');
        container.innerHTML = '';
        let rawTotal = 0;
        const t = i18n[currentLang];

        const sections = [
            { key: 'flower_order', title: t.flowerTitle },
            { key: 'embroidery_order', title: t.embroideryTitle },
            { key: 'sticker_order', title: t.stickerTitle }
        ];

        let hasItems = false;

        sections.forEach(sec => {
            const storedData = sessionStorage.getItem(sec.key);
            if (storedData) {
                let data = JSON.parse(storedData);
                hasItems = true;
                let div = document.createElement('div');
                div.className = 'cart-section';
                
                let invoiceLinesHtml = '';
                let totalQtyFromDetails = 0;

                if (data.details) {
                    let parts = data.details.split(' | ');
                    parts.forEach(part => {
                        if (part.trim() !== "" && !part.includes("الإجمالي") && !part.includes("الكمية")) {
                            let subParts = part.split(': ');
                            if (subParts.length > 1) {
                                invoiceLinesHtml += `<div class="invoice-line"><b>${subParts[0]}:</b> <span>${subParts[1]}</span></div>`;
                                let val = parseInt(subParts[1]);
                                if (!isNaN(val)) totalQtyFromDetails += val;
                            } else {
                                invoiceLinesHtml += `<div class="invoice-line"><span>${part}</span></div>`;
                            }
                        }
                    });
                }

                if (sec.key === 'embroidery_order' && data.text) {
                   invoiceLinesHtml += `<div class="invoice-line"><b>العبارة:</b> <span>${data.text}</span></div>`;
                }

                let displayQty = data.qty || data.count || totalQtyFromDetails || 0;
                let unit = (sec.key === 'flower_order') ? t.roses : "";

                div.innerHTML = `
                    <button class="delete-btn" onclick="removeItem('${sec.key}')">×</button>
                    <div class="section-title">${sec.title}</div>
                    <div class="invoice-card">
                        ${invoiceLinesHtml}
                        <div class="invoice-line" style="border:none; margin-top:5px; padding-top:5px; border-top:1px dashed #ccc;">
                            <b>${t.qtyLabel}</b> <span>${displayQty} ${unit}</span>
                        </div>
                    </div>
                    <div class="item-price-row">
                        <span>${t.price}</span>
                        <span>${parseFloat(data.price).toFixed(2)} ${t.currency}</span>
                    </div>
                `;
                container.appendChild(div);
                rawTotal += parseFloat(data.price);
            }
        });

        let finalValue = isPromoApplied ? rawTotal * 0.9 : rawTotal;
        document.getElementById('finalTotal').innerText = finalValue.toFixed(2) + " " + t.currency;
        document.getElementById('pageTitle').innerText = t.title;
        document.getElementById('totalText').innerText = isPromoApplied ? (currentLang === 'ar' ? "بعد الخصم:" : "After Discount:") : t.total;
        document.getElementById('submitBtn').innerText = t.send;
        document.getElementById('addMoreBtn').innerText = t.addMore;

        // تحديث حالة صندوق الخصم
        const removeBtn = document.getElementById('removePromoBtn');
        const promoInput = document.getElementById('promoInput');
        const promoBtn = document.getElementById('promoBtn');

        if (isPromoApplied) {
            removeBtn.style.display = 'flex';
            promoInput.value = 'alshesmo12';
            promoInput.disabled = true;
            promoBtn.style.opacity = '0.5';
            promoBtn.disabled = true;
        } else {
            removeBtn.style.display = 'none';
            promoInput.disabled = false;
            promoBtn.style.opacity = '1';
            promoBtn.disabled = false;
        }

        if (!hasItems) {
            container.innerHTML = `<div style="padding:40px; color:#888;">${t.empty}</div>`;
            document.getElementById('summaryBox').style.display = 'none';
            document.getElementById('promoContainer').style.display = 'none';
        } else {
            document.getElementById('summaryBox').style.display = 'block';
            document.getElementById('promoContainer').style.display = 'block'; // يبقى ظاهراً دائماً
        }
    }

    function applyPromo() {
        const input = document.getElementById('promoInput').value.trim();
        const t = i18n[currentLang];
        const msgEl = document.getElementById('promoMsg');
        const isAlreadyUsedOnDevice = localStorage.getItem('used_promo_alshesmo12') === 'true';

        if (input === 'alshesmo12') {
            if (isAlreadyUsedOnDevice) {
                msgEl.innerText = t.used;
                msgEl.style.color = "orange";
                return;
            }
            isPromoApplied = true;
            sessionStorage.setItem('promo_applied', 'true');
            localStorage.setItem('used_promo_alshesmo12', 'true');
            const popup = document.getElementById('successPopup');
            popup.style.display = 'block';
            let count = 0;
            const interval = setInterval(() => { createFlower(); count++; if (count > 50) clearInterval(interval); }, 100);
            setTimeout(() => { popup.style.display = 'none'; }, 3000);
            msgEl.innerText = "";
            renderCart();
        } else {
            msgEl.innerText = t.invalid;
            msgEl.style.color = "red";
        }
    }

    // وظيفة حذف الخصم
    function removePromo() {
        isPromoApplied = false;
        sessionStorage.removeItem('promo_applied');
        localStorage.removeItem('used_promo_alshesmo12');
        document.getElementById('promoInput').value = '';
        document.getElementById('promoMsg').innerText = "";
        renderCart();
    }

    function removeItem(key) {
        if (confirm(i18n[currentLang].confirmDelete)) {
            sessionStorage.removeItem(key);
            renderCart();
        }
    }

    function goToPage7() {
        renderCart();
        window.location.href = 'page7.html';
    }

    window.onload = renderCart;
</script>
</body>
</html>
