<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سلة المشتريات - متجر الشسمو</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none !important; user-select: none; }

        body {
            font-family: 'Cairo', sans-serif; margin: 0; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
            background: linear-gradient(-45deg, #f8f9ff, #e0c3fc, #8ec5fc, #fbc2eb);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            min-height: 100vh; display: flex; justify-content: center;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .mobile-container { width: 100%; max-width: 450px; }
        
        .glass-box {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border-radius: 40px; padding: 30px 20px; border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; margin-top: 40px;
        }

        h2 { color: #4a4e69; font-weight: 900; margin-bottom: 25px; }

        .cart-item {
            background: #ffffff; border-radius: 35px; padding: 30px 20px;
            margin-bottom: 30px; position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center; animation: fadeIn 0.4s ease-out;
            border: 1px solid #f0f0f0;
        }

        .delete-btn {
            position: absolute; top: 20px; left: 20px; background: #ffeded;
            color: #ff4d4d; border: none; width: 35px; height: 35px;
            border-radius: 12px; font-weight: 900; cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }

        .summary-title {
            color: #4a4e69; font-size: 22px; font-weight: 900;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 20px;
        }

        .invoice-box {
            background: #f8faff; border-radius: 25px; padding: 20px;
            text-align: right; border: 1px solid #edf2f7;
        }

        .detail-row {
            display: flex; justify-content: space-between;
            margin-bottom: 12px; font-size: 15px; line-height: 1.6;
        }

        .detail-row b { color: #4a4e69; font-weight: 900; }
        .detail-row span { color: #6d597a; font-weight: 800; text-align: left; flex: 1; margin-right: 10px; }
        
        .red-text { color: #e53e3e !important; }

        .divider { border-top: 2px dashed #cbd5e0; margin: 15px 0; }

        .item-total-price {
            font-size: 20px; font-weight: 900; color: #4a4e69;
            text-align: center; margin-top: 10px;
        }

        .promo-box { background: white; border-radius: 20px; padding: 10px; margin-bottom: 20px; display: flex; gap: 8px; border: 1px solid #eee; }
        .promo-input { flex: 1; height: 50px; border-radius: 15px; border: 2px solid #f0f0f0; padding: 0 15px; font-family: 'Cairo'; font-weight: 800; text-align: center; }
        .promo-btn { background: #6d597a; color: white; border: none; padding: 0 20px; border-radius: 15px; font-family: 'Cairo'; font-weight: 900; cursor: pointer; }
        
        .total-box { background: #4a4e69; color: white; border-radius: 25px; padding: 25px; display: flex; justify-content: space-between; font-weight: 900; font-size: 20px; margin-top: 20px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .btn { width: 100%; height: 65px; border-radius: 25px; font-family: 'Cairo'; font-weight: 900; border: none; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-send { background: #6d597a; color: white; box-shadow: 0 10px 20px rgba(109,89,122,0.3); }
        .btn-back { background: white; color: #6d597a; border: 2px solid #6d597a; text-decoration: none; display: flex; align-items: center; justify-content: center; }

        #proModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10001; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: white; padding: 25px; border-radius: 30px; text-align: center; width: 85%; max-width: 320px; animation: pop 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="glass-box">
            <h2>سلة المشتريات 🛒</h2>
            
            <div id="cartList"></div>

            <div id="summaryArea">
                <div class="promo-box">
                    <input type="text" id="promoInput" class="promo-input" placeholder="كود الخصم">
                    <button class="promo-btn" onclick="applyPromo()">تطبيق</button>
                </div>

                <div class="total-box">
                    <span>الإجمالي النهائي:</span>
                    <span id="finalPrice">0.00 د.أ</span>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-send" onclick="checkout()">إرسال الطلب ✨</button>
                    <a href="page2.html" class="btn btn-back">➕ إضافة منتج آخر</a>
                </div>
            </div>

            <div id="emptyCartActions" style="display:none; margin-top:20px;">
                <a href="page2.html" class="btn btn-send" style="text-decoration:none; display:flex; align-items:center; justify-content:center;">اكتشف الأقسام وابدأ الطلب</a>
            </div>
        </div>
    </div>

    <div id="proModal">
        <div class="modal-box">
            <h2 id="modalTitle" style="margin:0; color:#6d597a">تنبيه</h2>
            <p id="modalMsg" style="margin-top:10px; font-weight:700; color:#4a4e69"></p>
            <button class="modal-btn" style="background:#6d597a; color:white; border:none; width:100%; padding:12px; border-radius:15px; font-family:'Cairo'; font-weight:900; margin-top:15px;" onclick="closeModal()">حسناً</button>
        </div>
    </div>

<script>
    let isDiscounted = false;

    function renderCart() {
        const cartList = document.getElementById('cartList');
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        cartList.innerHTML = '';
        
        if (cart.length === 0) {
            cartList.innerHTML = '<div style="padding:40px; color:#888; font-weight:700;">السلة فارغة حالياً 🧺</div>';
            document.getElementById('summaryArea').style.display = 'none';
            document.getElementById('emptyCartActions').style.display = 'block';
            return;
        }

        document.getElementById('summaryArea').style.display = 'block';
        document.getElementById('emptyCartActions').style.display = 'none';
        let total = 0;

        cart.forEach((item, index) => {
            let itemPrice = Number(item.price) || 0;
            total += itemPrice;

            const lines = item.details.split('\n');
            let detailsHtml = '';
            
            lines.forEach(line => {
                if (line.includes(':')) {
                    const [label, value] = line.split(':');
                    const isRed = label.includes('العبارة') ? 'red-text' : '';
                    detailsHtml += `
                        <div class="detail-row">
                            <b>${label.trim()}:</b>
                            <span class="${isRed}">${value.trim()}</span>
                        </div>`;
                }
            });

            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <button class="delete-btn" onclick="removeItem(${index})">×</button>
                <div class="summary-title">📑 ملخص الطلب</div>
                <div class="invoice-box">
                    ${detailsHtml}
                    <div class="divider"></div>
                    <div class="item-total-price">الإجمالي: JOD ${itemPrice.toFixed(2)}</div>
                </div>
            `;
            cartList.appendChild(div);
        });

        if (sessionStorage.getItem('promo_applied') === 'true') {
            isDiscounted = true;
        }

        if (isDiscounted) total = total * 0.90;
        document.getElementById('finalPrice').innerText = total.toFixed(2) + " د.أ";
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    function applyPromo() {
        const code = document.getElementById('promoInput').value.trim();
        
        // 1. إذا كان الكود صحيحاً ولكن استُخدم مسبقاً
        if (code === 'alshesmo12' && localStorage.getItem('promo_used_on_device') === 'true') {
            return showAlert("عذراً", "هذا الكود تم استخدامه مسبقاً على هذا الجهاز ❌");
        }

        // 2. إذا كان الكود صحيحاً ومتاحاً للاستخدام
        if (code === 'alshesmo12') {
            isDiscounted = true;
            localStorage.setItem('promo_used_on_device', 'true');
            sessionStorage.setItem('promo_applied', 'true');
            renderCart();
            showAlert("مبروك!", "تم تفعيل الخصم بنجاح ✨");
        } 
        // 3. إذا كان الكود المدخل أي شيء آخر غير الصحيح
        else {
            showAlert("خطأ", "الكود الذي أدخلته غير صالح ❌");
        }
    }

    function checkout() {
        sessionStorage.setItem('final_price_formatted', document.getElementById('finalPrice').innerText);
        window.location.href = 'page7.html'; 
    }

    function showAlert(title, msg) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        document.getElementById('proModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('proModal').style.display = 'none'; }

    window.addEventListener('pageshow', renderCart);
    window.onload = renderCart;
</script>
</body>
</html>
