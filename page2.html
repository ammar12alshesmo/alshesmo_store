<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VB8CHYBNCN"></script>
<script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>الأقسام - متجر الورد الفاخر</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

        :root {
            --primary-color: #6d597a;
            --accent-color: #b56576;
            --bg-gradient: linear-gradient(-45deg, #f8f9ff, #e2d1f9, #add8e6, #fbc2eb);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
            margin: 0;
            padding: 0;
            outline: none !important; 
            user-select: none; 
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: meshGradient 12s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            transition: opacity 0.5s;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 40px 20px;
            text-align: center;
            perspective: 1000px;
        }

        .cart-wrapper {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
        }

        .cart-btn {
            background: rgba(255, 255, 255, 0.9);
            width: 65px;
            height: 65px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cart-btn:hover { transform: translateY(-5px) rotate(-10deg); }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e63946;
            color: white;
            font-size: 13px;
            font-weight: 900;
            min-width: 25px;
            height: 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .header-section {
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        #welcome-msg {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 18px;
            background: rgba(255,255,255,0.4);
            padding: 5px 25px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 15px;
        }

        h1 {
            color: #353535;
            font-size: 32px;
            font-weight: 900;
        }

        .categories-grid {
            display: grid;
            gap: 25px;
            margin-top: 20px;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            transition: all 0.5s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s forwards;
        }

        .category-card:nth-child(1) { animation-delay: 0.2s; }
        .category-card:nth-child(2) { animation-delay: 0.4s; }
        .category-card:nth-child(3) { animation-delay: 0.6s; }

        .category-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: white;
            box-shadow: 0 30px 60px rgba(109, 89, 122, 0.15);
        }

        .content-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .text-group { text-align: right; }

        .icon-box {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .cat-title {
            display: block;
            font-size: 22px;
            font-weight: 800;
            color: #4a4a4a;
        }

        .cat-subtitle {
            font-size: 13px;
            color: #888;
            font-weight: 600;
        }

        .arrow-box {
            width: 45px;
            height: 45px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            transition: 0.3s;
        }

        .category-card:hover .arrow-box {
            transform: translateX(-5px);
            background: var(--primary-color);
            color: white;
        }

        .footer-nav {
            margin-top: 50px;
        }

        .btn-return {
            background: var(--primary-color); 
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            color: white;
            font-family: 'Cairo';
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(109, 89, 122, 0.3);
        }

        .btn-return:active {
            transform: scale(0.95);
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="cart-wrapper">
        <div class="cart-btn" onclick="location.href='page6.html'">
            🛒
            <div class="cart-badge" id="cartCount">0</div>
        </div>
    </div>

    <div class="container">
        <div class="header-section">
            <span id="welcome-msg">اهلا وسهلا 💜</span>
            <h1 id="mainTitle">ماذا نجهز لك اليوم؟</h1>
        </div>

        <div class="categories-grid">
            <div class="category-card" onclick="navigateTo('page3.html')">
                <div class="content-group">
                    <div class="icon-box">🌸</div>
                    <div class="text-group">
                        <span class="cat-title">تنسيق الورد</span>
                        <span class="cat-subtitle">ورد صناعي بأكثر من 12 لون</span>
                    </div>
                </div>
                <div class="arrow-box">←</div>
            </div>

            <div class="category-card" onclick="navigateTo('page4.html')">
                <div class="content-group">
                    <div class="icon-box">🪡</div>
                    <div class="text-group">
                        <span class="cat-title">تطريز</span>
                        <span class="cat-subtitle">طارات ولوحات مبروزة</span>
                    </div>
                </div>
                <div class="arrow-box">←</div>
            </div>

            <div class="category-card" onclick="navigateTo('page5.html')">
                <div class="content-group">
                    <div class="icon-box">✨</div>
                    <div class="text-group">
                        <span class="cat-title">الستيكرات</span>
                        <span class="cat-subtitle">متوفر اكثر من 60 ستيكر حديد ب 75 قرش فقط</span>
                    </div>
                </div>
                <div class="arrow-box">←</div>
            </div>
        </div>

        <div class="footer-nav">
            <button class="btn-return" onclick="goBack()">الرجوع للرئيسية</button>
        </div>
    </div>

    <script>
        function getFirstName() {
            const fullName = sessionStorage.getItem('customer_name') || "";
            return fullName.split(' ')[0];
        }

        document.addEventListener('DOMContentLoaded', () => {
            refreshCart();
            // وضع الاسم مع القلوب المطلوبة
            const firstName = getFirstName();
            document.getElementById('welcome-msg').innerText = "اهلا وسهلا 💜" + firstName + "🤍";
        });

        // التعديل هنا ليعمل مع نظام السلة الموحد (localStorage)
        function refreshCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cartCount');
            if(badge) {
                badge.innerText = cart.length;
            }
        }

        function navigateTo(url) {
            document.body.style.opacity = '0.7';
            setTimeout(() => { window.location.href = url; }, 100);
        }

        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
