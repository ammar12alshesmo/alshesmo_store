<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <title>قسم الستيكرات - الشسمو</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap');

        /* منع التحديد الأزرق والوميض ومنع اختيار النص */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none !important; 
            user-select: none; 
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0; 
            /* دعم المناطق الآمنة في الهواتف الحديثة */
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
            background: linear-gradient(-45deg, #fbc2eb, #a6c1ee, #fddb92);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex; justify-content: center;
            transition: opacity 0.5s;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .mobile-container { width: 100%; max-width: 450px; text-align: center; }

        /* زر اللغة الثابت */
        .lang-switch-btn {
            position: fixed; top: 15px; right: 15px; z-index: 9999;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border: 2px solid #fff; padding: 8px 15px; border-radius: 15px;
            font-weight: 900; color: #4a4e69; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            font-size: 14px;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px 20px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-top: 40px;
        }

        h2 { color: #4a4e69; font-weight: 900; margin: 0 0 10px 0; font-size: 24px; }
        .price-info { color: #6d597a; font-weight: 800; font-size: 15px; margin-bottom: 25px; display: block; }

        .step-content { display: none; animation: fadeIn 0.4s ease-out; }
        .step-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stickers-grid {
            display: grid; 
            grid-template-columns: 1fr 1fr;
            gap: 20px; 
            margin-bottom: 30px;
            max-height: 55vh; 
            overflow-y: auto; 
            padding: 15px 5px;
            border-radius: 20px;
            background: rgba(0,0,0,0.02);
        }

        .sticker-card {
            background: white; 
            border-radius: 25px; 
            padding: 18px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sticker-card img { 
            width: 100%; 
            height: 100px; 
            object-fit: contain; 
            margin-bottom: 12px; 
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.05));
        }

        .sticker-label {
            font-size: 14px;
            font-weight: 800;
            color: #4a4e69;
            margin-bottom: 12px;
        }

        .counter-box {
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: #f1f3f5; 
            border-radius: 50px; 
            padding: 5px;
            width: 100%;
        }

        .btn-c {
            width: 34px; height: 34px; 
            border-radius: 50%; 
            border: none;
            background: white; 
            color: #4a4e69; 
            font-size: 20px; 
            font-weight: 900;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1); 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .count-val { font-weight: 900; color: #6d597a; font-size: 18px; margin: 0 10px; }

        .receipt-container { 
            background: #fafafa; 
            border-radius: 25px; 
            padding: 25px; 
            border: 1px solid #eee;
        }
        html[dir="rtl"] .receipt-container { text-align: right; }
        html[dir="ltr"] .receipt-container { text-align: left; }

        .receipt-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            font-weight: 700; 
            color: #4a4e69;
            font-size: 15px;
        }
        .total-line { 
            border-top: 3px dashed #ddd; 
            margin-top: 20px; 
            padding-top: 20px; 
            font-size: 22px; 
            color: #6d597a; 
            font-weight: 900; 
        }

        .btn-group { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 25px; }
        .btn {
            flex: 1; height: 65px; border-radius: 25px; font-family: 'Cairo';
            font-weight: 900; font-size: 18px; cursor: pointer; border: none;
            transition: 0.3s; min-width: 120px;
        }
        .btn-next { background: #6d597a; color: white; box-shadow: 0 8px 20px rgba(109,89,122,0.3); }
        .btn-back { background: white; color: #6d597a; border: 2px solid #6d597a; }
        .btn:active { transform: translateY(2px); }

        .stickers-grid::-webkit-scrollbar { width: 5px; }
        .stickers-grid::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }
    </style>
</head>
<body>

<div class="lang-switch-btn" onclick="toggleLanguage()" id="langBtn">EN</div>

<div class="mobile-container">
    <div class="glass-box">
        
        <div id="step1" class="step-content active">
            <h2 id="h2-step1">قسم الستيكرات ✨</h2>
            <span class="price-info" id="priceInfo">أي ستيكر بـ 1 دينار فقط</span>
            
            <div class="stickers-grid" id="stickersGrid"></div>

            <div class="btn-group">
                <button class="btn btn-back btn-back-text" onclick="window.location.href='page2.html'">عودة</button>
                <button class="btn btn-next" id="btnInvoice" onclick="validateStep1()">عرض الفاتورة</button>
            </div>
        </div>

        <div id="step2" class="step-content">
            <h2 id="h2-step2">ملخص طلبك 🧾</h2>
            <div id="invoiceContent" class="receipt-container"></div>
            
            <div class="btn-group">
                <button class="btn btn-back" id="btnEdit" onclick="goToStep(1)">تعديل</button>
                <button class="btn btn-next" id="btnConfirm" onclick="confirmAndStore()">تأكيد نهائي</button>
                <button class="btn btn-back btn-home-text" style="width: 100%; flex: none;" onclick="window.location.href='page2.html'">عودة للأقسام</button>
            </div>
        </div>

    </div>
</div>

<script>
    const translations = {
        ar: {
            lang: "EN",
            step1: "قسم الستيكرات ✨",
            price: "أي ستيكر بـ 1 دينار فقط",
            back: "عودة",
            invoice: "عرض الفاتورة",
            step2: "ملخص طلبك 🧾",
            edit: "تعديل",
            confirm: "تأكيد نهائي",
            home: "عودة للأقسام",
            sticker: "ستيكر",
            piece: "حبة",
            total: "المجموع النهائي:",
            unit: "د.أ",
            alert: "يرجى اختيار ستيكر واحد على الأقل 🌸",
            success: "تمت إضافة الستيكرات للسلة بنجاح! 🛒"
        },
        en: {
            lang: "AR",
            step1: "Stickers Section ✨",
            price: "Any sticker for only 1 JOD",
            back: "Back",
            invoice: "Show Invoice",
            step2: "Order Summary 🧾",
            edit: "Edit",
            confirm: "Final Confirm",
            home: "Back to Sections",
            sticker: "Sticker",
            piece: "pcs",
            total: "Final Total:",
            unit: "JOD",
            alert: "Please select at least one sticker 🌸",
            success: "Stickers added to cart successfully! 🛒"
        }
    };

    let cart = {};

    function toggleLanguage() {
        const html = document.documentElement;
        const isAr = html.getAttribute('dir') === 'rtl';
        const newLang = isAr ? 'en' : 'ar';
        const t = translations[newLang];

        html.setAttribute('dir', isAr ? 'ltr' : 'rtl');
        html.setAttribute('lang', newLang);

        document.getElementById('langBtn').innerText = t.lang;
        document.getElementById('h2-step1').innerText = t.step1;
        document.getElementById('priceInfo').innerText = t.price;
        document.querySelectorAll('.btn-back-text').forEach(el => el.innerText = t.back);
        document.getElementById('btnInvoice').innerText = t.invoice;
        document.getElementById('h2-step2').innerText = t.step2;
        document.getElementById('btnEdit').innerText = t.edit;
        document.getElementById('btnConfirm').innerText = t.confirm;
        document.querySelectorAll('.btn-home-text').forEach(el => el.innerText = t.home);

        document.querySelectorAll('.sticker-label').forEach((el, idx) => {
            el.innerText = `${t.sticker} #${idx + 1}`;
        });

        if(document.getElementById('step2').classList.contains('active')) showInvoice();
    }

    const grid = document.getElementById('stickersGrid');
    for (let i = 1; i <= 30; i++) {
        const id = 's' + i;
        grid.innerHTML += `
            <div class="sticker-card">
                <img src="s${i}.png" onerror="this.src='https://via.placeholder.com/100/f8f9fa/6d597a?text=S${i}'">
                <div class="sticker-label">ستيكر #${i}</div>
                <div class="counter-box">
                    <button class="btn-c" onclick="updateCount('${id}', -1)">-</button>
                    <span class="count-val" id="count-${id}">0</span>
                    <button class="btn-c" onclick="updateCount('${id}', 1)">+</button>
                </div>
            </div>
        `;
    }

    function updateCount(id, change) {
        if (!cart[id]) cart[id] = 0;
        cart[id] += change;
        if (cart[id] < 0) cart[id] = 0;
        document.getElementById('count-' + id).innerText = cart[id];
    }

    function goToStep(s) {
        document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
        window.scrollTo(0,0);
    }

    function validateStep1() {
        let totalQty = Object.values(cart).reduce((a, b) => a + b, 0);
        if (totalQty === 0) {
            const lang = document.documentElement.lang || 'ar';
            alert(translations[lang].alert);
            return;
        }
        showInvoice();
        goToStep(2);
    }

    function showInvoice() {
        const lang = document.documentElement.lang || 'ar';
        const t = translations[lang];
        let total = 0;
        let html = "";
        let stickerItems = [];
        
        for (let id in cart) {
            if (cart[id] > 0) {
                let num = id.replace('s','');
                let name = `${t.sticker} #${num}`;
                html += `
                    <div class="receipt-row">
                        <span>${name} (${cart[id]} ${t.piece})</span>
                        <span>${cart[id]} ${t.unit}</span>
                    </div>`;
                total += cart[id];
                stickerItems.push(`${name} (x${cart[id]})`);
            }
        }

        html += `
            <div class="total-line">
                <div class="receipt-row">
                    <span>${t.total}</span>
                    <span>${total} ${t.unit}</span>
                </div>
            </div>
        `;
        document.getElementById('invoiceContent').innerHTML = html;

        let stickerOrder = {
            count: total,
            price: total,
            details: stickerItems.join(', ')
        };
        sessionStorage.setItem('sticker_order', JSON.stringify(stickerOrder));
    }

    function confirmAndStore() {
        const lang = document.documentElement.lang || 'ar';
        alert(translations[lang].success);
        window.location.href = 'page2.html';
    }
</script>

</body>
</html>
